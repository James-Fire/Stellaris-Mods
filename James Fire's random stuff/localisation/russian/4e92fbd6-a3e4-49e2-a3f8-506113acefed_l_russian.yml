building_admin_base_fd34a3dcef054afc8096415bd91013f0:0 "Министерство Управления Инфраструктурой"
building_admin_base_fd34a3dcef054afc8096415bd91013f0_desc:0 "§Y$building_admin_base_fd34a3dcef054afc8096415bd91013f0$§! позволяет сфокусировать часть социальных исследований на передовых демографических показателях, что, в свою очередь, даёт небольшой толчок развитию потенциала управления."

building_admin_upgrade_698418100b80455aadbdc33b0663b285:0 "Министерство Развития"
building_admin_upgrade_698418100b80455aadbdc33b0663b285_desc:0 "Самые яркие умы работают с самой передовой технологией, которая позволяет сразу передавать информацию вплоть до наносекунды для администраторов, чтобы позволить им управлять ещё эффективнее."

building_admin_upgrade_2_e6e714350561429ca8496c74d68eede0:0 "Министерство Национальной Экспансии"
building_admin_upgrade_2_e6e714350561429ca8496c74d68eede0_desc:0 "Использование алгоритмов и оборудования для содействия передовому расширению владений с помощью прогнозной аналитики для более эффективного управления империей."

building_admin_upgrade_3_dc7cbd9df41746669e9d763e9abf84f1:0 "Министерство Галактических Владений"
