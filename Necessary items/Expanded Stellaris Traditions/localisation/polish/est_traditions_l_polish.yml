################################################################
# ACADEMY
################################################################
tradition_est_academy:0 "Academy"
tradition_est_academy_desc:0 "Academies, Schools and Universities are spread across our empire and those that wish to reach the top do so through their intricate hierarchies."
tr_est_academy_adopt:0 "Academy Traditions"
tr_est_academy_adopt_desc:0 "$tradition_est_academy_desc$\n\n$tr_est_academy_adopt_effect$\n\n$tr_est_academy_finish_effect$"
tr_est_academy_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§YEmpire Leader Capacity§! increased by §Y2§!."

tr_est_academy_1:0 "Public Education"
tr_est_academy_1_desc:0 "§YEmpire Leader Pool Size§! increased by §Y3§!."
tr_est_academy_1_delayed:0 "Education is a right which belongs to all. Through public education we ensures a basic level of education for all or citizen. From width comes excellence."

tr_est_academy_2:0 "Mandatory Higher Education"
tr_est_academy_2_desc:0 "§Y$MOD_LEADER_SKILL_LEVELS$§! increased by §Y1§!."
tr_est_academy_2_delayed:0 "By ensuring that the large majority of all our citizen attain a higher education we can ensure that the various functions in our society is executed by capable leaders."

tr_est_academy_3:0 "Learn, Unlearn, and Relearn"
tr_est_academy_3_desc:0 "§YLeader Experience Gain§! increased by §G+20%§!."
tr_est_academy_3_delayed:0 "We value learning, not only for the knowledge but as a process in itself. This makes our leader more able to learn from their experiences."

tr_est_academy_4:0 "Towers of Ivory"
tr_est_academy_4_desc:0 "£building  §YLevel 3 Science Labs§! produce an additional §Y1§! of their primary resource and £building  §YLevel 4 Science Labs§! produce an additional §Y2§!."
tr_est_academy_4_delayed:0 "Those that have reached the top of the academic ladder are given unlimited resources in their own pursuits of new knowledge. In their towers of ivory they are free to do research without interference from the outside."

tr_est_academy_5:0 "Naval Schools"
tr_est_academy_5_desc:0 "§Y$MOD_SHIP_EVASION_MULT$§! increased by §G+5%§! and §Y$MOD_SHIP_COMBAT_SPEED_MULT$§! increased by §G+10%§!."
tr_est_academy_5_delayed:0 "By ensuring a throughout basic education for even the lowest of our naval officers we can ensure an improved efficiency for our fleets."

tr_est_academy_finish:0 "Academy Traditions finished"
tr_est_academy_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_academy_adopt$ will allow leaders to upgrade one of their traits whenever they reach §YSkill Level§! §G5§!. The upgraded trait is twice as good as the normal one."

### Swap - Shroudborn ###

tradition_est_psion:0 "Shroudborn"
tradition_est_psion_desc:0 "We are perhaps the most powerful psionic being in the galaxy. Mortal psionics who make contacts with us die or go mad."
tr_est_psion_adopt:0 "Shroudborn Traditions"
tr_est_psion_adopt_desc:0 "$tradition_est_psion_desc$\n\n$tr_est_psion_adopt_effect$\n\n$tr_est_psion_finish_effect$"
tr_est_psion_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n£unity  §YUnity§! output is increased by §G+10%§!."

tr_est_psion_1:0 "Intrusive Mind"
tr_est_psion_1_desc:0 "§Y$MOD_SHIP_EVASION_MULT$§! increased by §G+10%§!."
tr_est_psion_1_delayed:0 "We are able to intrude into the minds of mortals, reading their thoughts and predicting their actions."

tr_est_psion_2:0 "Mind Supression"
tr_est_psion_2_desc:0 "§Y$MOD_ARMY_MORALE_DAMAGE_MULT$§! increased by §G+25%§! and §Y$MOD_PLANET_BORDER_MULT$§! is reduced by §R-25%§! for all neighbouring mortal empires."
tr_est_psion_2_delayed:0 "As we reach into the mortal minds we are able to dull their thoughts and supress their feelings, reducing their will to find or their ambitions."

tr_est_psion_3:0 "Everwatcher"
tr_est_psion_3_desc:0 "§Y$MOD_PLANET_SENSOR_RANGE_MULT$§! increased by §G+75%§!."
tr_est_psion_3_delayed:0 "Throughout the galaxy, we are always present, watching the passing of time and lives."

tr_est_psion_4:0 "Seventh Sense"
tr_est_psion_4_desc:0 "§YAnomality Discovery Chance§! is increased by §G+10%§! and §YSurvey Speed§! is increased by §G+20%§!."
tr_est_psion_4_delayed:0 "Through our connection to the Shroud we have developed a seventh sense for the state of the galaxy, sensing thing we normally wouldn’t."

tr_est_psion_5:0 "Power Manifestation"
tr_est_psion_5_desc:0 "§Y$MOD_SHIP_SHIELD_HP_MULT$§! is increased by §G+15%§! and §YEnergy Weapon Damage§! is increased by §G+15%§!."
tr_est_psion_5_delayed:0 "So powerful is our mind that we are able to manifest it in the physical world, increasing the power of our ships weapons and defences."

tr_est_psion_finish:0 "Shroudborn Traditions finished"
tr_est_psion_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_psion_adopt$ increases §YLeader Experience Gain§! increased by §G+25%§!."

### Swap - Hacking ###

tradition_est_hacking:0 "Hacking"
tradition_est_hacking_desc:0 "We are agile, able to enter the computer system of other empires and alter them to our likings."
tr_est_hacking_adopt:0 "Hacking Traditions"
tr_est_hacking_adopt_desc:0 "$tradition_est_hacking_desc$\n\n$tr_est_hacking_adopt_effect$\n\n$tr_est_hacking_finish_effect$"
tr_est_hacking_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§YResearch Speed (Computing)§! increased by §G+25%§!."

tr_est_hacking_1:0 "System Manipulation"
tr_est_hacking_1_desc:0 "§Y$MOD_SHIP_EVASION_MULT$§! increased by §G+10%§!."
tr_est_hacking_1_delayed:0 "By carefully manipulating the targeting systems of enemy ships we can reduce their capacity to successfully target our ships in battle."

tr_est_hacking_2:0 "Communication Disruption"
tr_est_hacking_2_desc:0 "§Y$MOD_PLANET_BORDER_MULT$§! is reduced by §R-25%§! for all neighbouring empires."
tr_est_hacking_2_delayed:0 "We can disrupt foreign communications systems, reducing our neighbour’s ability to efficiently communicate within their empire."

tr_est_hacking_3:0 "Spyware"
tr_est_hacking_3_desc:0 "§Y$MOD_PLANET_SENSOR_RANGE_MULT$§! increased by §G+75%§!."
tr_est_hacking_3_delayed:0 "We can hi-jack the surveillance and observation systems of other empires, using them to get a better idea of the space which surrounds our empire."

tr_est_hacking_4:0 "Malware"
tr_est_hacking_4_desc:0 "§Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§! is reduced by §R-10%§! and §YBuilding Upkeep§! is increased by §R+15%§! for all rival empires."
tr_est_hacking_4_delayed:0 "By performing harmful attacks on our rivals computer systems we can reduce the efficiency with which they run their empires."

tr_est_hacking_5:0 "Database Mining"
tr_est_hacking_5_desc:0 "§Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§! is increased by §G+10%§!."
tr_est_hacking_5_delayed:0 "By mining the databases of other empires we can find valuable information that we can use in our own research projects."

tr_est_hacking_finish:0 "Hacking Traditions finished"
tr_est_hacking_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_hacking_adopt$ increases §Y$MOD_COUNTRY_RIVALRY_INFLUENCE_GAIN$§! by §G+30%§!.."

################################################################
# ADMINISTRATUM
################################################################
tradition_est_administratum:0 "Administratum"
tradition_est_administratum_desc:0 "Legions of clerks and bureaucrats oversee our empire. They are those that ensure that it works as decreed by our rulers."
tr_est_administratum_adopt:0 "Administratum Traditions"
tr_est_administratum_adopt_desc:0 "$tradition_est_administratum_desc$\n\n$tr_est_administratum_adopt_effect$\n\n$tr_est_administratum_finish_effect$"
tr_est_administratum_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§YEmpire Leader Capacity§! increased by §Y4§!."

tr_est_administratum_1:0 "Streamlined Recruitment Processes"
tr_est_administratum_1_desc:0 "§Y$MOD_LEADER_INFLUENCE_COST$§! reduced by §G-20%§!."
tr_est_administratum_1_delayed:0 "Due to the vast number of recruits that are needed for our empire we cannot retain our old recruitment processes. They need to be streamlined in such a way that every potential recruit can be processed with a minimum of manual work from our recruiters."

tr_est_administratum_2:0 "Meritocratic Promotion Policies"
tr_est_administratum_2_desc:0 "§Y$MOD_LEADER_GOVERNOR_SKILL_LEVELS$§! increased by §Y2§!."
tr_est_administratum_2_delayed:0 "Before politics, intrigue, and petty quarrels could affect who can get promoted. New strict guidelines and centralized promotion decisions ensures that that is no longer the case."

tr_est_administratum_3:0 "Efficient Bureaucracy"
tr_est_administratum_3_desc:0 "§Y$MOD_SPACEPORT_SHIP_BUILD_SPEED_MULT$§! increased by §G+10%§!, §Y$MOD_PLANET_BUILDING_BUILD_SPEED_MULT$§! increased by §G+25%§! and §Y$MOD_PLANET_CLEAR_BLOCKER_TIME_MULT$§! reduced by §G-25%§!."
tr_est_administratum_3_delayed:0 "The expanding bureaucracy threatens slowing down the efficiency of our administration. By employing new, improved, bureaucratic techniques we ensure that this does not happen."

tr_est_administratum_4:0 "Standardized Planetary Administration"
tr_est_administratum_4_desc:0 "Planets with a §YSector Governor§! and at least a £building  §YPlanetary Administration§! produces an additional §G+10%§! £unity  §YUnity§! and have their §YBuilding Cost§! reduced by §G-10%§!. The effect is halved for core worlds."
tr_est_administratum_4_delayed:0 "We control a large number of planets and as our empire grows their local administrations are at the risk of diverging. By instituting a standard template of planetary administration, we ensure similar governance on all our worlds."

tr_est_administratum_5:0 "Bureau of Oversight"
tr_est_administratum_5_desc:0 "§Y$MOD_COUNTRY_EDICT_LENGTH_MULT$§! increased by §G+50%§!."
tr_est_administratum_5_delayed:0 "The Bureau of Oversight is an independent organization in our administration. Its representatives, the overseers, will travel throughout our empire ensuring that it is governed according to regulations. It is the highest fear of every local administrator to get a remark from an overseer."

tr_est_administratum_finish:0 "Administratum Traditions finished"
tr_est_administratum_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_administratum_adopt$ unlocks an additional §YCivic Slot§!."

### Swap - Omnipresence ###

tradition_est_omnipresence:0 "Omnipresence"
tradition_est_omnipresence_desc:0 "We are one, yet we are everywere. We are able to give our full attention to both the grand scheme of things, as well as the smallest action of the most insignificant of drones."
tr_est_omnipresence_adopt:0 "Omnipresence Traditions"
tr_est_omnipresence_adopt_desc:0 "$tradition_est_omnipresence_desc$\n\n$tr_est_omnipresence_adopt_effect$\n\n$tr_est_administratum_finish_effect$"
tr_est_omnipresence_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_LEADER_INFLUENCE_COST$§! reduced by §G-20%§!."

tr_est_omnipresence_1:0 "Increased Capacity"
tr_est_omnipresence_1_desc:0 "§YEmpire Leader Capacity§! increased by §Y4§!."
tr_est_omnipresence_1_delayed:0 "As our we expand throughout the galaxy our min needs to expand as well to be able to accomondate the expanding number of autonomous drones."

tr_est_omnipresence_2:0 "Full Information Processing"
tr_est_omnipresence_2_delayed:0 "Every day we are faced by a vast quantity of impressions and information. By registering even the most insignificant of input we can better earn from experience and thus hone our abilities even further."

tr_est_omnipresence_3:0 "Full Drone Presence"
tr_est_omnipresence_3_delayed:0 "Rather than drone behaviour being largely determined by reflexes we will take full control over each individual drone, thus maximizing their efficiency."

tr_est_omnipresence_4:0 "Simultaneous Control"
tr_est_omnipresence_4_delayed:0 "Certain similar tasks are carried out over several of our worlds at the same time. By developing techniques for simultaneously controlling these processes we can improve our cognitive efficiency. "
tr_est_omnipresence_4_machines:0 "Simultaneous Control"
tr_est_omnipresence_4_machines_desc:0 "Planets with a §YSector Governor§! and at least a £building  §Y$building_machine_capital_1$§! produces an additional §G+10%§! £unity  §YUnity§! and have their §YBuilding Cost§! reduced by §G-10%§!. The effect is halved for core worlds."
tr_est_omnipresence_4_machines_delayed:0 "Certain similar tasks are carried out over several of our worlds at the same time. By developing techniques for simultaneously controlling these processes we can improve our cognitive efficiency. "

tr_est_omnipresence_5:0 "Advanced Cognitive Synapses"
tr_est_omnipresence_5_delayed:0 "By improving the way our presence flows through our realm we will be able to controll it."

tr_est_omnipresence_5_machine:0 "Transmitter Towers"
tr_est_omnipresence_5_machine_delayed:0 "By constructing specialized transmitter towers to broadcast or cognitive signals we can better control the workings of our realm."

tr_est_omnipresence_finish:0 "Omnipresence Traditions finished"
tr_est_omnipresence_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_omnipresence_adopt$ unlocks an additional §YCivic Slot§!."

################################################################
# COMMERCE
################################################################
tradition_est_commerce:0 "Commerce"
tradition_est_commerce_desc:0 "Where there is trade there is a profit to be made. Trade is the lifeblood of the galaxy and from ie we can draw vast fortunes."
tr_est_commerce_adopt:0 "Commerce Traditions"
tr_est_commerce_adopt_desc:0 "$tradition_est_commerce_desc$\n\n$tr_est_commerce_adopt_effect$\n\n$tr_est_commerce_finish_effect$"
tr_est_commerce_adopt_no_dip_desc:0 "$tradition_est_commerce_desc$\n\n$tr_est_commerce_adopt_no_dip_effect$\n\n$tr_est_commerce_finish_effect$"
tr_est_commerce_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_COUNTRY_TRADE_ATTRACTIVENESS$§! increased by §G+10%§!."
tr_est_commerce_adopt_no_dip_effect:0 "§E$TRADITIONS_ADOPT$:§!\nOur £energy  §YEnergy§! output is increased by §G+10%§!."

tr_est_commerce_1:0 "Economic Boom"
tr_est_commerce_1_desc:0 "Our £energy  §YEnergy§! output is increased by §G+15%§! while £energy  §YEnergy§! gain is positive."
tr_est_commerce_1_delayed:0 "Thanks to our successful fiscal policies our economy is booming. Both our citizen and the businesses have increased power to buy, consume, and produce. These favorable conditions will allow our empire to increase its spending on infrastructure and the military."

tr_est_commerce_2:0 "Encourage Local Economies"
tr_est_commerce_2_desc:0 "Unlocks 3 new planetary edicts which will increase either our £food  §YFood§!, £energy  §YEnergy Credit§! or £minerals  §YMinerals§! output by §G+25%§! while reducing the output of the other 2 by §R-10%§!."
tr_est_commerce_2_delayed:0 "We should encourage each one of our planets to develope their local economies in their own distinct way. This relaxing certain imperial regulations we can allow planets to better adapt to their local conditions and therby increase their productive output."

tr_est_commerce_3:0 "Financial Reforms"
tr_est_commerce_3_desc:0 "§YEnergy Storage Capacity§! increased by §G+50%§!."
tr_est_commerce_3_delayed:0 "Our financial system is still adapted to when we were bound to our own solar system. Now we are a part of a galactic system with an endless number of modes of payment. Hence our old financial system will need to be reformed."

#tr_est_commerce_4:0 "Free Trade"
#tr_est_commerce_4_desc:0 "The £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  Pops is increased by §G+1%§! and our £unity  §YUnity§! output is increased by §G+2%§! for every §Y20§! in £energy  §YEnergy§! §YTrade Income§! or §YTrade Expenses§!. Stack up to §Y10§! times."
#tr_est_commerce_4_delayed:0 "Everyone is entitled to pursue the profession of a trader, and everything may be traded. As long as trade flows and profits are made we can ensure prosperity for our empire. "

tr_est_commerce_4:0 "The Traders"
tr_est_commerce_4_desc:0 "Gain £energy  §YEnergy Credits§! and £minerals  §YMinerals§! equal to a six times of our monthly gain when surveying a planet colonized by another empire."
tr_est_commerce_4_delayed:0 "Specially sanctioned trades travels to the distant corners of the galaxy selling and buying rare commodities and making large profits."

tr_est_commerce_5:0 "Market Exchange"
tr_est_commerce_5_desc:0 "§HUnlocks Building:§! $building_est_market_exchange$. \n(Provides §Y3§! £energy  §YEnergy Credits§! in adjacency bonus)"
tr_est_commerce_5_delayed:0 "The Market Exchange serves as a hub of trade on our planets. Here our citizen can come to buy and sell all manner of services and goods."

tr_est_commerce_finish:0 "Commerce Traditions finished"
tr_est_commerce_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_commerce_adopt$ increases our £energy  §YEnergy Credit§! production by §G+5%§! for every §Y3§! types of §YStrategic Resources§! we control. Stack up to §Y5§! times."

## Swap - Benevolence

tradition_est_benevolence:0 "Benevolence"
tradition_est_benevolence_desc:0 "We should not make unjustified harm to the mortals we encounter. They have a place in this galaxy, just as we do."
tr_est_benevolence_adopt:0 "Benevolence Traditions"
tr_est_benevolence_adopt_desc:0 "$tradition_est_benevolence_desc$\n\n$tr_est_benevolence_adopt_effect$\n\n$tr_est_benevolence_finish_effect$"
tr_est_benevolence_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§YDiplomatic Upkeep Cost§! reduced by §G-33%§!."

tr_est_benevolence_1:0 "Peacefull Contacts"
tr_est_benevolence_1_desc:0 "Reduce §YBorder Friction§! by §G-50%§! and increase §YTrust Growth§! by §G+20%§!."
tr_est_benevolence_1_delayed:0 "When we make contact with other civilizations our approach needs not be aggressive. Rather lets it be known that our ships will not attack those that have no harm in mind."

tr_est_benevolence_2:0 "Foreign Embassies"
tr_est_benevolence_2_desc:0 "Foreign Empire £opinion  §YOpinion§! is increased by §G+50§!."
tr_est_benevolence_2_delayed:0 "We will send out representation drones to other empires through which we will be able to contact directly with their rulers. This way we can promote good relations with the other inhabitants of the galaxy and prevent misunderstandings."

tr_est_benevolence_3:0 "Trade Deals"
tr_est_benevolence_3_desc:0 "§Y$MOD_COUNTRY_TRADE_ATTRACTIVENESS$§! increased by §G+10%§! and £energy  §YEnergy§! output is increased by §G+5%§!."
tr_est_benevolence_3_delayed:0 "While we have no concept of possession, it is essential to many other beings in the galaxy. Through trade deals with other civilizations we may acquire goods that are hard to find on our own planets."

tr_est_benevolence_4:0 "Trade Missions"
tr_est_benevolence_4_desc:0 "Gain £energy  §YEnergy Credits§! and £minerals  §YMinerals§! equal to a six times of our monthly gain when surveying a planet colonized by another empire."
tr_est_benevolence_4_delayed:0 "We will send out specialized trade ships throughout the galaxy, carrying specialized goods that we can make, but which is sought-after throughout the galaxy. These goods can then be traded for other valuables. "

tr_est_benevolence_5:0 "Sharing of Ideas"
tr_est_benevolence_5_desc:0 "§Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§! increased by §G+5%§!."
tr_est_benevolence_5_delayed:0 "While the mortals of this galaxy carry inferior minds they might have come up with a few interesting ideas. By studying their technology and culture we might find something that could be of use to our own research projects."

tr_est_benevolence_finish:0 "Benevolence Traditions finished"
tr_est_benevolence_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_benevolence_adopt$ increases our §YWeapon Damage§! to §YFallen Empires§!, §YAwakened Empires§! and §YEnd Game Crisises§! by §G+20%§!."

################################################################
# CONFEDERACY
################################################################
tradition_est_confederacy:0 "Confederacy"
tradition_est_confederacy_desc:0 "Each part of our empire wields a great degree of autonomy. But towards the galaxy we show a united front."
tr_est_confederacy_adopt:0 "Confederacy Traditions"
tr_est_confederacy_adopt_desc:0 "$tradition_est_confederacy_desc$\n\n$tr_est_confederacy_adopt_effect$\n\n$tr_est_confederacy_finish_effect$"
tr_est_confederacy_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nIncrease £minerals  §YMineral§! and £energy  §YEnergy Credit§! output by §G+10%§! on all planets controleld by §YSectors§!."

tr_est_confederacy_1:0 "Local Command Structures"
tr_est_confederacy_1_desc:0 "§YEmpire Leader Capacity§! increased by §Y3§! and §YGovernor Recruitment Cost§! reduced by §G-50%§!."
tr_est_confederacy_1_delayed:0 "Rather than centralizing the assignments of important positions we will let each local government use their own command structures."

tr_est_confederacy_2:0 "Restrict Federal Power"
tr_est_confederacy_2_desc:0 "§Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-20§! and £happiness  §Y$MOD_POP_HAPPINESS$§! increased by §G+10%§! in all §YSectors§! governed by a §YGovernor§!."
tr_est_confederacy_2_delayed:0 "To centralize power is to steal it from where it belongs. To guarantee the sovereignty of our numerous of states we will enforce strict restrictions on what power the federal government might wield."

tr_est_confederacy_3:0 "Decentralized Military Efforts"
tr_est_confederacy_3_desc:0 "§Y$MOD_NAVY_SIZE_MULT$§! increased by §G+15%§! and §YUpkeep§! is reduced by §G-50%§! for all §YMilitary Stations§! controleld by §YSectors§!."
tr_est_confederacy_3_delayed:0 "In addition to our united navy each part of our empire will be tasked with maintaining their own military force."

tr_est_confederacy_4:0 "Autonomous States"
tr_est_confederacy_4_desc:0 "Our §YSubjects§! receive §G+10%§! £happiness  §Y$MOD_POP_HAPPINESS$§! and §G+20%§! §Y$MOD_NAVY_SIZE_MULT$§!, in addition their £opinion  §YOpinion§! of us is increased by §G+50§!. §Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-10§! on all our planets."
tr_est_confederacy_4_delayed:0 "Our empire is composed of an intricate structure of states, local governments, independent planets, federal space, and other denominations, each with varying degree of autonomy. Many of these are allowed to govern themselves to a great extent."

tr_est_confederacy_5:0 "National Assembly"
tr_est_confederacy_5_desc:0 "§YFaction Influence Gain§! increased by §G+50%§!."
tr_est_confederacy_5_delayed:0 "The National Assembly is an important part of our government. Here local representations from all over our empire meet to discuss and vote upon important matters of state."

tr_est_confederacy_finish:0 "Confederacy Traditions finished"
tr_est_confederacy_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_confederacy_adopt$ allows us to use the §YGrant Autonomy§! £edict  §YEdict§! and §Y$MOD_COUNTRY_SECTOR_CAP_ADD$§! incresed by §G4§!."
 
### Swap - Subminds ###

tradition_est_subminds:0 "Subminds"
tradition_est_subminds_desc:0 "By dividing our minds into several parts we can increase efficiency. We can then merge and re divide with various subminds to continuously stay up to date with the workings of the empire."
tr_est_subminds_adopt:0 "Subminds Traditions"
tr_est_subminds_adopt_desc:0 "$tradition_est_subminds_desc$\n\n$tr_est_subminds_adopt_effect$\n\n$tr_est_subminds_finish_effect$"
tr_est_subminds_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nIncrease £minerals  §YMineral§! and £energy  §YEnergy Credit§! output by §G+10%§! on all planets controleld by §YSectors§!."

tr_est_subminds_1:0 "Dynamic Mind"
tr_est_subminds_1_desc:0 "§Y$MOD_LEADER_INFLUENCE_COST$§! reduced by §G-20%§! and §YGovernor Recruitment Cost§! reduced by §G-30%§!."
tr_est_subminds_1_delayed:0 "Our mind is dynamic, well used to ripping apart small pieces of itself. This greatly increases our ability to create autonomous drones."

tr_est_subminds_2:0 "Micro Merging"
tr_est_subminds_2_desc:0 "£unity §YUnity§! is increased by §G15%§! and §YConsumer Goods Cost§! is reduced by §G-15%§! in all §YSectors§! governed by a §YGovernor§!."
tr_est_subminds_2_delayed:0 "By continuously performing micro merges between the mind and the various subminds we have created we can ensure that the various components of our mind is always acting in unison."

tr_est_subminds_3:0 "Military Planning"
tr_est_subminds_3_desc:0 "§Y$MOD_NAVY_SIZE_MULT$§! increased by §G+15%§! and §YUpkeep§! is reduced by §G-50%§! for all §YMilitary Stations§! controleld by §YSectors§!."
tr_est_subminds_3_delayed:0 "We can created subminds specialising in planning our military. These will at all time consider the state of our military, to ensure that we at all times are ready for war."

tr_est_subminds_4:0 "Representation Drones"
tr_est_subminds_4_desc:0 "Our §YSubjects§! receive §G+10%§! £happiness  §Y$MOD_POP_HAPPINESS$§! and §G+20%§! §Y$MOD_NAVY_SIZE_MULT$§!, in addition their £opinion  §YOpinion§! of us is increased by §G+50§!."
tr_est_subminds_4_delayed:0 "We will send out specialized representation drones to our subjects. These will ensure efficient communication between ourselves and our subjects."

tr_est_subminds_5:0 "Control Submind Parameters"
tr_est_subminds_5_desc:0 "Unlocks a set of edicts increasing sector £minerals /£energy /£food /£engineering £physics £society /£unity  output by §G+15%§!/§G+15%§!/§G+20%§!/§G+10%§!/§G+20%§!. Only one can be active at at time."
tr_est_subminds_5_delayed:0 "By carefully crafting the subminds that we create, we can better tailor them to specific tasks that we intend them to do."

tr_est_subminds_5_machines:0 "$tr_est_subminds_5$"
tr_est_subminds_5_machines_desc:0 "Unlocks a set of edicts increasing sector £minerals /£energy /£engineering £physics £society /£unity  output by §G+15%§!/§G+15%§!/§G+10%§!/§G+20%§!. Only one can be active at at time."
tr_est_subminds_5_machines_delayed:0 "$tr_est_subminds_5_delayed$"

tr_est_subminds_finish:0 "Subminds Traditions finished"
tr_est_subminds_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_subminds_adopt$ increases §YEmpire Leader Capacity§! and §YEmpire Leader Pool Size§! by §Y2§!."
 
################################################################
# CYBERNETICS
################################################################
tradition_est_cybernetics:0 "Cybernetics"
tradition_est_cybernetics_desc:0 "Why do something ourself, when a machine can do it for us?"
tr_est_cybernetics_adopt:0 "Cybernetics Traditions"
tr_est_cybernetics_adopt_desc:0 "$tradition_est_cybernetics_desc$\n\n$tr_est_cybernetics_adopt_effect$\n\n$tr_est_cybernetics_finish_effect$"
tr_est_cybernetics_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§YResearch Speed (Computing)§! increased by §G+25%§!."

tr_est_cybernetics_1:0 "Deep Neural Networks"
tr_est_cybernetics_1_desc:0 "No £energy  §YEnergy Credit§! production penalty for §YRobot§! and §YDroid§! £pops  §YPops§!. §YSynthetic§! £pops  §YPops§! £energy  §YEnergy Credit§! output is increased by §G+5%§!."
tr_est_cybernetics_1_no_robots_desc:0 "Our £energy  §YEnergy§! output is increased by §G+10%§!."
tr_est_cybernetics_1_delayed:0 "Advanced neural network technologies have allowed machines to perform tasks previously only sentients could manage."

tr_est_cybernetics_2:0 "Unsupervised AI Researchers"
tr_est_cybernetics_2_desc:0 "No £engineering  §YEngineering§!, £physics  §YPhysics§! and £society  §YSociety§! output penalty for §YRobot§! and §YDroid§! £pops  §YPops§!. §YSynthetic§! £pops  §YPops§! £engineering  §YEngineering§!, £physics  §YPhysics§! and £society  §YSociety§! output is increased by §G+5%§!."
tr_est_cybernetics_2_no_robots_desc:0 "Our £engineering  §YEngineering§!, £physics  §YPhysics§! and £society  §YSociety§! output is increased by §G+5%§!."
tr_est_cybernetics_2_delayed:0 "Advances in AI technology have increasingly allowed AIs to access to most advanced of tasks. Several research topics have shown to be especially suited for AI researchers. With unorthodox thinking and immense processing capacity they are set on specific problems. Researchers will they occasionally check on their progress, and figure out how it can be incorporated in our current scientific theories. "

tr_est_cybernetics_3:0 "Combat Simulations"
tr_est_cybernetics_3_desc:0 "§YStrike Craft Fire Rate§! increased by §G+20%§! and §YEvasion§! increased by §G+5%§!."
tr_est_cybernetics_3_delayed:0 "With increased computing capacities, we can perform increasingly accurate simulations. These can be utilized by our ships to continuously simulated possible developments during combat. These data can then be given to the ship commander which can utilize it in the decision-making process."

tr_est_cybernetics_4:0 "AI Controlled Ships"
tr_est_cybernetics_4_desc:0 "§Y$MOD_SHIP_FIRE_RATE_MULT$§! increased by §G+20%§! and §YEvasion§! increased by §G+20%§! for all fleets without an §YAdmiral§!."
tr_est_cybernetics_4_delayed:0 "It seems only foolish to let sentients with their limited sensory input and processing power be at the command of our fleets. We shall instead use an AI commander which can simultaneously control all ships in the fleet. They can all time have a complete perception of the battle and ensure that all ships act in unison."

tr_est_cybernetics_5:0 "Simulated Reality"
tr_est_cybernetics_5_desc:0 "The £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  §YPops§! is increased by §G+5%§!, the £happiness  §Y$MOD_POP_HAPPINESS$§! of all §YSlaves§! is increased by §G+10%§! and the £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  §YPops§! with §YChemical Bliss§! §YLiving Standards§! is increased by §G+20%§!."
tr_est_cybernetics_5_delayed:0 "Why should be spend our life’s in this world, when we can create a world of our liking? Our citizens have increasingly started to spend time in alternative realities, which they can shape as they wish."

tr_est_cybernetics_finish:0 "Cybernetics Traditions finished"
tr_est_cybernetics_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_cybernetics_adopt$ §HUnlocks Buildings:§! $building_est_automated_mine$, $building_estautomated_power_plant$ and $building_est_automated_farm$.\n(Producing §Y1§! £minerals §YMinerals§!, £energy §YEnergy Credits§! and £food §YFood§! respectively. Requires no £pops  §YPops§! to work)\n"
 
### Swap - Biogenesis ###
 
tradition_est_biogenesis:0 "Biogenesis"
tradition_est_biogenesis_desc:0 "Our civilization is not build, but grown. We are one single great organism, spreading through the galaxy."
tr_est_biogenesis_adopt:0 "Biogenesis Traditions"
tr_est_biogenesis_adopt_desc:0 "$tradition_est_biogenesis_desc$\n\n$tr_est_biogenesis_adopt_effect$\n\n$tr_est_biogenesis_finish_effect$"
tr_est_biogenesis_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_POP_ENVIRONMENT_TOLERANCE$§! increased by §G+10%§! and §Y$MOD_PLANET_COLONY_DEVELOPMENT_SPEED_MULT$§! increased by §G+25%§!."

tr_est_biogenesis_1:0 "Spawning Pools"
tr_est_biogenesis_1_desc:0 "§Y$MOD_POP_GROWTH_SPEED$§! increased by §G+20%§!"
tr_est_biogenesis_1_delayed:0 "Drones are spawned at a continuous rate from designated spawning pools. Each spawning pool produce a specified type of drones. This will allow us to produce drones at a much higher rate than before."

tr_est_biogenesis_2:0 "Bio COnstruction"
tr_est_biogenesis_2_desc:0 "§Y$MOD_PLANET_BUILDING_UPKEEP_MULT$§! and §YBuilding Cost§! is reduced by §G-10%§!."
tr_est_biogenesis_2_delayed:0 "Our buildings are not built with stones and concrete. Rather we grow them from organic tissue, the blueprints exists not on paper or in computers, but are encoded into the DNA of the structure itself."

tr_est_biogenesis_3:0 "Living Ships"
tr_est_biogenesis_3_desc:0 "§YMonthly Hull Regeneration§! is increased by §G+1%§!."
tr_est_biogenesis_3_delayed:0 "Our ships are alive, crafted from organic tissue, grown from our designs."

tr_est_biogenesis_4:0 "Omnivores"
tr_est_biogenesis_4_desc:0 "Our £food  §YFood§! output is increased by §G+20%§!."
tr_est_biogenesis_4_delayed:0 "All types of organic matter can be consumed and turned to energy our be used to grow new tissue."

tr_est_biogenesis_5:0 "Constant Evolution"
tr_est_biogenesis_5_desc:0 "§Y$species_trait_points_add$§! increased by §Y1§! and the time it takes to modify species is reduced by §G-5%§!."
tr_est_biogenesis_5_delayed:0 "Evolution is a process without a goal. While the mind is constant, our form is always changing as we expand throughout the galaxy."

tr_est_biogenesis_finish:0 "Biogenesis Traditions finished"
tr_est_biogenesis_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_biogenesis_adopt$ unlocks a policy which lets you convert a monthly amount of £food  §YFood§! to £minerals  §YMinerals§!."
 
### Swap - Processing ###
 
tradition_est_processing:0 "Processing"
tradition_est_processing_desc:0 "The power of our mind comes from processors in our drones, ships and all other objects we have created. To increase our capacity we will make dedicated processing plants, vast halls filled with computers performing various tasks for our civilization."
tr_est_processing_adopt:0 "Processing Traditions"
tr_est_processing_adopt_desc:0 "$tradition_est_processing_desc$\n\n$tr_est_processing_adopt_effect$\n\n$tr_est_processing_finish_effect$"
tr_est_processing_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_COUNTRY_CORE_SECTOR_SYSTEM_CAP$§! increased by §G2§!."

tr_est_processing_1:0 "Data Cores"
tr_est_processing_1_desc:0 "£energy  §YEnergy§! output is increased by §G+15%§!."
tr_est_processing_1_delayed:0 "Under the surfaces of our planets we will build large server halls to provide processing power for the various systems we are running in our empire."

tr_est_processing_2:0 "Memory Banks"
tr_est_processing_2_desc:0 "£engineering  §YEngineering§!, £physics  §YPhysics§! and £society  §YSociety§! output is increased by §G+5%§!."
tr_est_processing_2_delayed:0 "We will maintain vast memory banks with all types of information we have picked up since the awakening. We cannot know which pieces of information will prove useful, but some certainly will."

tr_est_processing_3:0 "Signaling Network"
tr_est_processing_3_desc:0 "The effect on increased §Y$TRADITION_COST$§! caused by number of colonies is reduced by §G-20%§!."
tr_est_processing_3_delayed:0 "As we spread across the galaxy our previous signalling systems start to become outdated. We will build new specialised signalling stations on our worlds. Utilizing their vast capacity these will be able to efficiently transmit signals throughout our realm, while at the same time providing additional robustness with respect to disruptions. These will create a high-capacity network were each signal is transmitted through several paths to ensure high quality delivery."

tr_est_processing_4:0 "Training Databases"
tr_est_processing_4_desc:0 "Your leaders passively gain experience points at a slow rate."
tr_est_processing_4_delayed:0 "Our autonomous drones collect vast quantities of data from various scenarios that the experience. By saving this data in databases we can run simulations and evaluations on it to train our current autonomous drone programs."

tr_est_processing_5:0 "Coordination Terminal"
tr_est_processing_5_desc:0 "§YEmpire Leader Capacity§! increased by §Y4§!."
tr_est_processing_5_delayed:0 "We control a vast number of drones, all with different levels of autonomy. To support this network we will construct specialized coordination terminals. Each one of these will be able to receive input from a large number of drones and help to coordinate their response to the situation at hand."

tr_est_processing_finish:0 "Processing Traditions finished"
tr_est_processing_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_processing_adopt$ increases §YEnergy Storage Capacity§! by §G+50%§!."
 
