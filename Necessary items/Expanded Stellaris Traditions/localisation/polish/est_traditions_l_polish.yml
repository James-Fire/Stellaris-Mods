tr_est_faith_1:0 "One Faith"
tr_est_faith_1_desc:0 "Our £unity  §YUnity§! output is increased by §G+10%§!."
tr_est_faith_1_delayed:0 "Before our faiths have been fractured. By now as we reach for the stars we have united under one single form of belief."

tr_est_faith_2:0 "Places of Worship"
tr_est_faith_2_desc:0 "The £building  §Y$building_autochthon_monument$§! §YBuilding Chain§! produce and additional §Y1§! £unity  §YUnity§! for each §YBuilding Level§!."
