################################################################
tradition_est_foundation:0 "Foundation"
tradition_est_foundation_desc:0 "Others try to spread their empires far and wide. We works towards a deeper and more fundamental goal."
tr_est_foundation_adopt:0 "Foundation Traditions"
tr_est_foundation_adopt_desc:0 "$tradition_est_foundation_desc$\n\n$tr_est_foundation_adopt_effect$\n\n$tr_est_foundation_finish_effect$"
tr_est_foundation_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nIncreases £engineering  §YEngineering§!, £physics  §YPhysics§! and £society  §YSociety§! output on all our §YCore Worlds§! by §G+10%§!."

tr_est_foundation_1:0 "A Common Cause"
tr_est_foundation_1_desc:0 "£unity  §YUnity§! output is increased by §G+15%§! on all our §YCore World§!."
tr_est_foundation_1_delayed:0 "We are all united in a common cause. Everyone of us knows that they are an important cog in the machinery that works towards our goal."

tr_est_foundation_2:0 "Intelligence Gathering Corps"
tr_est_foundation_2_desc:0 "§Y$MOD_SHIP_SENSOR_RANGE_MULT$§! increased by §G+25%§! and §YSurvey Speed§! increased by §G+10%§!"
tr_est_foundation_2_delayed:0 "Our Intelligence Gathering Corps travels the galaxy and continuously sends information back home about the state of the galaxy. This information is vital to our cause, or at least to minimize disturbance from the outside."

tr_est_foundation_3:0 "Expanding the Navy"
#tr_est_foundation_3_desc:0 "£building  §Y$building_capital_2$§! produce an additional §Y5§! £energy  §YEnergy Credits§! and §Y5§! £minerals  §YMinerals§!. £building  §Y$building_capital_3$§! produce an additional §Y15§! £energy  §YEnergy Credits§! and §Y15§! £minerals  §YMinerals§!."
tr_est_foundation_3_desc:0 "Increase our §!Naval Capacity§! by §G10§! for every one of our core planets with a spaceport. Increase it by an additional §G10§! for every one of our core planets with a maximum level spaceport."
tr_est_foundation_3_delayed:0 "In the galaxy there are those that would hinder us from carrying out our task. We must ensure that we have a strong navy to defend our cause."

tr_est_foundation_4:0 "Centralized Government"
tr_est_foundation_4_desc:0 "£energy  §YEnergy Credit§!, £engineering  §YEngineering§!, £physics  §YPhysics§! and £society  §YSociety§! output is increased by §G+50%§! on our §GCapital World§!."
tr_est_foundation_4_delayed:0 "Our government is centralized to our capital from which it can govern the relatively few number of worlds that we control."

tr_est_foundation_5:0 "The Grand Design"
tr_est_foundation_5_desc:0 "§Y$country_resource_influence_add$§! increased by §G1§!"
tr_est_foundation_5_delayed:0 "Central to everything is the Grand Design. It is this that we follow and only a few know it down to the smallest detail."

tr_est_foundation_finish:0 "Foundation Traditions finished"
tr_est_foundation_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_foundation_adopt$ increases §Y$MOD_PLANET_BORDER_MULT$§! by §G+15%§! and §Y$MOD_POP_RESOURCE_OUTPUT$§! by §G+5%§! for all our §YCore Worlds§!."

