################################################################
tradition_est_isolation:0 "Isolation"
tradition_est_isolation_desc:0 "If we wish to keep our way of life we must prevent any influence from the galaxy on our society."
tr_est_isolation_adopt:0 "Isolation Traditions"
tr_est_isolation_adopt_desc:0 "$tradition_est_isolation_desc$\n\n$tr_est_isolation_adopt_effect$\n\n$tr_est_isolation_finish_effect$"
tr_est_isolation_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_COUNTRY_CORE_SECTOR_SYSTEM_CAP$§! increased by §G2§!."

tr_est_isolation_1:0 "Fortified Borders"
tr_est_isolation_1_desc:0 "§YMilitary Station Build Cost§! reduced by §G-25%§! and §YMilitary Station Upkeep Cost§! reduced by §G-25%§!."
tr_est_isolation_1_delayed:0 "We do not trust the outsiders to keep their distance. Our borders must be fortified to deter from any form of aggression."

tr_est_isolation_2:0 "Fierce Defenders"
tr_est_isolation_2_desc:0 "§Y$MOD_ARMY_DEFENSE_MORALE_MULT$§! increased by §G+50%§! and the §Y$MOD_SHIP_FIRE_RATE_MULT$§! is increased by §G+20%§! for ships within our borders."
tr_est_isolation_2_delayed:0 "We are prepared to defend our way of life at any cost. Any intrusion must be stopped."

tr_est_isolation_3:0 "Buffer Zones"
tr_est_isolation_3_desc:0 "§Y$MOD_COUNTRY_BORDER_MULT$§! increased by §G+20%§!."
tr_est_isolation_3_delayed:0 "We will institute buffer zones between our worlds and that of others. The further away they are from us, the better."

tr_est_isolation_4:0 "Guarding Against Foreign Influences"
tr_est_isolation_4_desc:0 "§Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! increased by §G+15%§!."
tr_est_isolation_4_delayed:0 "Outside influences may take any form. We must guard against anything that might change our way of life."

tr_est_isolation_5:0 "Closed Society"
tr_est_isolation_5_desc:0 "Our £unity  §YUnity§! output is increased by §G+20%§! while we have no diplomatic relations with the exception of §YNon-Aggression Pacts§!."
tr_est_isolation_5_delayed:0 "We will remain an isolated society, cut of from the rest of the galaxy. On our worlds we will live our life independently of what happens in the galaxy."

tr_est_isolation_finish:0 "Isolation Traditions finished"
tr_est_isolation_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_isolation_adopt$ increases the £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  Pops by §G+10%§! while not at war."
 
################################################################
# JUSTICE
################################################################
tradition_est_justice:0 "Justice"
tradition_est_justice_desc:0 "Everyone shall unconditionally answer to the law, for it stands above evrything else."
tr_est_justice_adopt:0 "Justice Traditions"
tr_est_justice_adopt_desc:0 "$tradition_est_justice_desc$\n\n$tr_est_justice_adopt_effect$\n\n$tr_est_justice_finish_effect$"
tr_est_justice_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-25§! on all our planets."

tr_est_justice_1:0 "Equals in front of the Law"
tr_est_justice_1_desc:0 "The £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  §YPops§! is increased by §G+5%§! and our £unity  §YUnity§! output increased by §G+5%§!."
tr_est_justice_1_delayed:0 "The law stands above all. Everyone, whoever they might or might not be, will answer to it. To their class, standing or wealth, the law is blind."

tr_est_justice_2:0 "Freedom of Speech"
tr_est_justice_2_desc:0 "The £happiness  §YHappines§! of all §YFactions§! is increased by §G+5%§! while no §YFaction§! is supressed."
tr_est_justice_2_delayed:0 "It is important that everyone have the right to voice their opinions and ideas, without repercussion from the law. This is our citizens right."

tr_est_justice_3:0 "Adeptus Arbites"
tr_est_justice_3_desc:0 "§Y$MOD_PLANET_COLONY_DEVELOPMENT_SPEED_MULT$§! increased by §G+25%§!, the effect on increased §Y$TRADITION_COST$§! caused by number of colonies is reduced by §G-15%§! and §Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-5§! on all our planets."
tr_est_justice_3_delayed:0 "Representatives of the order of the Adeptus Arbites travel through our empire. These representatives of the law have full right to deliver full justice on the worlds at the fringe of our empire, where it might otherwise have been absent."

tr_est_justice_4:0 "Supreme Court"
tr_est_justice_4_desc:0 "§Y$MOD_COUNTRY_EDICT_LENGTH_MULT$§! increased by §G+10%§! and §Y$MOD_COUNTRY_EDICT_INFLUENCE_COST$§! reduced by §G-5%§!."
tr_est_justice_4_delayed:0 "The Supreme Court regulates the activities of our government to ensure that their actions does not go against that of the laws the work under."

tr_est_justice_5:0 "Constitution"
tr_est_justice_5_desc:0 "Reduce £pops  §YPops§! effect on §Y$TRADITION_COST$§! by §G-25%§!."
tr_est_justice_5_delayed:0 "Our constitution contains the most fundamental principles of our justice system. It regulates the ruling of our empire as well as the rights and responsibilities of its citizens."

tr_est_justice_finish:0 "Justice Traditions finished"
tr_est_justice_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_justice_adopt$ increases §YResource Output§! by §G+5%§! for all £pops  §YPops§! which are either §YFull citizens§! or non enslaved while living under a §YCaste System§!."

### Swap - Destruction ###

tradition_est_destruction:0 "Destruction"
tradition_est_destruction_desc:0 "Our goal is simple. The destruction of all life in this galaxy."
tr_est_destruction_adopt:0 "Destruction Traditions"
tr_est_destruction_adopt_desc:0 "$tradition_est_destruction_desc$\n\n$tr_est_destruction_adopt_effect$\n\n$tr_est_destruction_finish_effect$"
tr_est_destruction_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_NAVY_SIZE_MULT$§! is increased by §G+25%§!."

tr_est_destruction_1:0 "Task of Destruction"
tr_est_destruction_1_desc:0 "Gain §G5§! £influence  §YInfluence§! whenever we purge a £pop  §YPop§!."
tr_est_destruction_1_delayed:0 "Every life we take is one step in the cleansing of this galaxy."

tr_est_destruction_2:0 "Warborn"
tr_est_destruction_2_desc:0 "§Y$MOD_SHIP_WEAPON_DAMAGE$§! and §YArmy Damage§! is increased by §G+10%§!."
tr_est_destruction_2_delayed:0 "We were born to fight, only in battle can we serve our one true purpose."

tr_est_destruction_3:0 "Eradication"
tr_est_destruction_3_desc:0 "Unlocks the §YEradication§! planetary wargoal which instantaneously purges all pops on the target planets and turns it barren."
tr_est_destruction_3_delayed:0 "To truly rid this galaxy of the mortals we must not only take their lives, but also the life of all planets able to support them."

tr_est_destruction_4:0 "Fear"
tr_est_destruction_4_desc:0 "Reduce the £unity  §YUnity§! output and §YGrowth Speed§! of neighbouring mortal empires by §R-25%§!."
tr_est_destruction_4_delayed:0 "Everyone knows who we are. They know or purpose and that we are capable of achieving it. Our mere presence in this galaxy cause terror in its inhabitants."

tr_est_destruction_5:0 "Nemesis of the Galaxy"
tr_est_destruction_5_desc:0 "§Y$MOD_COUNTRY_MAX_RIVALRIES$§! increased by §G2§! and §Y$MOD_COUNTRY_RIVALRY_INFLUENCE_GAIN$§! increased by §G+20%§!."
tr_est_destruction_5_delayed:0 "As our powers grow and as we draw closer to our goal the mortals of this galaxy comes to realize that either they destroy us, or we destroy them."

tr_est_destruction_finish:0 "Destruction Traditions finished"
tr_est_destruction_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_destruction_adopt$ Increases our £influence  §YMonthly Influence Gain§! by §G2§! while we are at war."

################################################################
# LIBERTY
################################################################
tradition_est_liberty:0 "Liberty"
tradition_est_liberty_desc:0 "All the sentients of the galaxy should be considered as equals with equal rights and oppertunities. In our diversity we find strength."
tr_est_liberty_adopt:0 "Liberty Traditions"
tr_est_liberty_adopt_desc:0 "$tradition_est_liberty_desc$\n\n$tr_est_liberty_adopt_effect$\n\n$tr_est_liberty_finish_effect$"
tr_est_liberty_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nThe effect on increased §Y$TRADITION_COST$§! caused by number of §YXeno Pops§! is reduced by §G-50%§!."

tr_est_liberty_1:0 "Open Society"
tr_est_liberty_1_desc:0 "§Y$MOD_PLANET_MIGRATION_ALL_PULL$§! increased by §G+30%§! and §Y$pop_ethic_xenophile_attraction_mult$§! by §G+10%§!."
tr_est_liberty_1_delayed:0 "Our society is open towards others. Here all sentients may gather and find a home."

tr_est_liberty_2:0 "Foreign Embassies"
tr_est_liberty_2_desc:0 "Foreign Empire £opinion  §YOpinion§! is increased by §G+50§!."
tr_est_liberty_2_delayed:0 "Until they prove us different we will consider those living outside our borders as our friends. We will send embassies to their worlds to learn their ways, and learn them about ours."

tr_est_liberty_3:0 "A Melting Pot of Cultures"
tr_est_liberty_3_desc:0 "§Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$§! increased by §G+5%§!."
tr_est_liberty_3_delayed:0 "As all manner of sentients gather on our worlds ideas from different cultures mix. This melting pot of cultures is a prime basis for new technological advancements."

tr_est_liberty_4:0 "A Righteous Cause"
tr_est_liberty_4_desc:0 "§Y$MOD_SHIP_WEAPON_DAMAGE$§! increased by §G+15%§!, §Y$MOD_ARMY_DAMAGE_MULT$§! increased by §G+25%§! and §Y$MOD_SHIP_UPKEEP_MULT$§! decreased by §G-10%§! while we are at war with a war leader which permits slavery or purging."
tr_est_liberty_4_delayed:0 "We will always stand against oppression of any kind. We are ready to stand up for those not strong enough to stand up for themselves."

tr_est_liberty_5:0 "Freedom of Movement"
tr_est_liberty_5_desc:0 "§Y$MOD_POP_MIGRATION_SPEED$§! increased by §G+30%§!."
tr_est_liberty_5_delayed:0 "While many societies allow free movement we take it to another level entirely. Those that travels in our empire will be welcomed with open arms and open homes where ever they go."

tr_est_liberty_finish:0 "Liberty Traditions finished"
tr_est_liberty_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_liberty_adopt$ increases £unity  §YUnity§! output and £energy  §YEnergy Credit§! output by §G+5%§! on all planets with at least §Y3§! species. The £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  Pops on these planets is increased by §G+5%§!."

################################################################
# MALICE
################################################################
tradition_est_malice:0 "Malice"
tradition_est_malice_desc:0 "The suffering of others is our joy. Only through the destruction of other civilizations we can prove the greatness of ours."
tr_est_malice_adopt:0 "Malice Traditions"
tr_est_malice_adopt_desc:0 "$tradition_est_malice_desc$\n\n$tr_est_malice_adopt_effect$\n\n$tr_est_malice_finish_effect$"
tr_est_malice_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nThe effect on increased §Y$TRADITION_COST$§! caused by §YXeno Slaves§! is removed. The effect on increased §Y$TRADITION_COST$§! caused by number of §YSlaves§! is reduced by §G-25%§!."

tr_est_malice_1:0 "Bread and Water"
tr_est_malice_1_desc:0 "The mineral cost of §Y$CONSUMER_GOODS$§! used by our §YSlaves§! is reduced by §G-50%§!."
tr_est_malice_1_delayed:0 "Our slaves are given no more support than what they need to live. Not the tiniest amount of effort would be spent to give them any comfort what so ever. Their existence is truly a miserable one."

tr_est_malice_2:0 "Eradication of Hope"
tr_est_malice_2_desc:0 "§Y$MOD_COUNTRY_UNREST_UNHAPPY_SLAVE_EFFECT_MULT$§! reduced by §G-10%§! and §YResettlement Cost§! is reduced by §G-25%§! for all §YSlaves§!."
tr_est_malice_2_delayed:0 "Those poor souls that work as slaves in our society have long abandoned all hope of escaping with their life. They have accepted their fate and continue their sad existance knowing that it is everything they will ever get."

tr_est_malice_3:0 "No one's Friend"
tr_est_malice_3_desc:0 "§Y$MOD_COUNTRY_MAX_RIVALRIES$§! increased by §G3§!."
tr_est_malice_3_delayed:0 "None would consider us their friend. It is of no concern of ours. We do not need any friends."

tr_est_malice_4:0 "Antagonists"
tr_est_malice_4_desc:0 "§Y$MOD_COUNTRY_RIVALRY_INFLUENCE_GAIN$§! increased by §G+30%§!."
tr_est_malice_4_delayed:0 "We are considered true antagonists of every civilization in the galaxy. A threat to everyone's existence. Indeed, this is what we are."

tr_est_malice_5:0 "The Joy of Destruction"
tr_est_malice_5_desc:0 "Destroying enemy ships and stations provide £unity  §YUnity§!. Amount increase with ship or station size."
tr_est_malice_5_delayed:0 "We draw immense pleasure in others misery. To destroy what other have created is our purpose."

tr_est_malice_finish:0 "Malice Traditions finished"
tr_est_malice_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_malice_adopt$ increases §Y$MOD_SHIP_WEAPON_DAMAGE$§! by §G+10%§!."

################################################################
# MECHANICUM
################################################################
tradition_est_mechanicum:0 "Mechanicum"
tradition_est_mechanicum_desc:0 "The creation of great and powerful machines is to be considered an art above all others."
tr_est_mechanicum_adopt:0 "Mechanicum Traditions"
tr_est_mechanicum_adopt_desc:0 "$tradition_est_mechanicum_desc$\n\n$tr_est_mechanicum_adopt_effect$\n\n$tr_est_mechanicum_finish_effect$"
tr_est_mechanicum_adopt_robots_desc:0 "$tradition_est_mechanicum_desc$\n\n$tr_est_mechanicum_adopt_robots_effect$\n\n$tr_est_mechanicum_finish_effect$"
tr_est_mechanicum_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nOur £minerals  §YMineral§! output is increased by §G+5%§! and §Y$MOD_PLANET_BUILDING_BUILD_SPEED_MULT$§! increased by §G+15%§!."
tr_est_mechanicum_adopt_robots_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_POP_ROBOT_UPKEEP_MULT$§! reduced by §G-20%§!."

tr_est_mechanicum_1:0 "Engineering Corps"
tr_est_mechanicum_1_desc:0 "Reduce §YUpkeep Cost§! and §YBuild Cost§! of §YConstruction Ships§! by §G-80%§!. §YMining Station Buid Cost§! increased by §G-11%§."
tr_est_mechanicum_1_delayed:0 "While many consider engineering a fine profession few treasure it like we do. Engineers are considered to be at the pinnacle of society and even a low-grade engineer is highly respected. We do not hesitate to invest in our engineers and our engineering corps is one of the most extensive in the galaxy."

tr_est_mechanicum_2:0 "Automated production"
tr_est_mechanicum_2_desc:0 "§Y$MOD_POP_CONSUMER_GOODS_MULT$§! reduce by §G-15%§! and §Y$MOD_PLANET_BUILDING_COST_MULT$§! reduce by §G-5%§!."
tr_est_mechanicum_2_robots_desc:0 "§Y$MOD_POP_ROBOT_BUILD_COST_MULT$§! decreased by §G-25%§!."
tr_est_mechanicum_2_delayed:0 "We have managed to automate our production lines. With little to no oversight our factories can assemble the basic machines needed by our citizens and empire."

tr_est_mechanicum_3:0 "Machines of War"
tr_est_mechanicum_3_desc:0 "§HUnlocks Attachment:§! $army_attachment_est_mechanical_knights$, §HUnlocks Army:§! $est_titan_army$, \n§Y$MOD_ARMY_DAMAGE_MULT$§! increased by §G+10%§!."
tr_est_mechanicum_3_delayed:0 "Large battle machines are an imposing sight on the battlefield. Various bipedal walkers are able to field both superior armor and heavier weaponry as composed to or normal troops."

tr_est_mechanicum_4:0 "Grand Designs"
tr_est_mechanicum_4_desc:0 "§YMilitary Station Hull Points§! increased by §G+30%§!."
tr_est_mechanicum_4_megastruct_desc:0 "§YMegastructure Build Speed§! increased by §G+25%§! and §YMegastructure Build Cost§! decreased by §G-15%§!."
tr_est_mechanicum_4_delayed:0 "Our engineers are able to design constructs far outsizing those found elsewhere in the galaxy. Indeed, we are proud of the pure scale of our construction projects."

tr_est_mechanicum_5:0 "Develop new Blueprints"
tr_est_mechanicum_5_desc:0 "§Y$MOD_COUNTRY_ENGINEERING_TECH_RESEARCH_SPEED$§! increased by §G+15%§!."
tr_est_mechanicum_5_robots_desc:0 "§YRobot Modification Points§! increased by §G1§!."
tr_est_mechanicum_5_machines_desc:0 "§YMachine Modification Points§! increased by §G1§!."
tr_est_mechanicum_5_delayed:0 "While standard templates are spread throughout our empire we also encourage new improved design. This task is something reserved for our most skilled engineers."

tr_est_mechanicum_finish:0 "Mechanicum Traditions finished"
tr_est_mechanicum_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_mechanicum_adopt$ increases §Y$MOD_SHIP_HITPOINTS_MULT$§! by §G+10%§!."

################################################################
# MILITARISM
################################################################
tradition_est_militarism:0 "Militarism"
tradition_est_militarism_desc:0 "Our military is what protects our presence in our galaxy. It is only natural that we should build our society around it."
tr_est_militarism_adopt:0 "Militarism Traditions"
tr_est_militarism_adopt_desc:0 "$tradition_est_militarism_desc$\n\n$tr_est_militarism_adopt_effect$\n\n$tr_est_militarism_finish_effect$"
tr_est_militarism_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nIncrease §Y$MOD_POP_RESOURCE_OUTPUT$§! by §G+5%§! while we are at, or over, our §YNaval Capacity§!"

tr_est_militarism_1:0 "Conscription"
tr_est_militarism_1_desc:0 "§YGarrison Health§! increased by §G+300%§!, §Y$MOD_PLANET_ARMY_BUILD_COST_MULT$§! reduced by §G-50%§! and §Y$MOD_SPACEPORT_SHIP_BUILD_COST_MULT$§! reduced by §G-5%§!."
tr_est_militarism_1_delayed:0 "Everyone may be drafted into our armies. It is considered a citizen's duty to serve our armed force. Even for those that go on to other professions it is a good experience to have served in the disciplined structure of our military."

tr_est_militarism_2:0 "Reform Army Hierarchies"
tr_est_militarism_2_desc:0 "§YGeneral Skills§! increased by §Y2§!, §YGeneral Recruitment Cost§! reduced by §G-50%§!, §Y$MOD_ARMY_MORALE$§! increased by §G+10%§! and §Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-5§! on all our planets."
tr_est_militarism_2_delayed:0 "Our army is still organized as it was before we left our solar system. Now the military is dominated by the interstellar fleet and the army is primarily used to control and invade planets. We must reform our army to better fit this new role."

tr_est_militarism_3:0 "§H§!The Grand Armada"
tr_est_militarism_3_desc:0 "§Y$MOD_NAVY_SIZE_MULT$§! is increased by §G+25%§!."
tr_est_militarism_3_delayed:0 "§H§!We will put more resources into expanding our armada. As it becomes one of the greatest gatherings of ship ever seen it will be rightly feared throughout this galaxy."

tr_est_militarism_4:0 "Office of Organization"
tr_est_militarism_4_desc:0 "§Y$MOD_ARMY_UPKEEP_MULT$§! decreased by §G-20%§! and §Y$MOD_SHIP_UPKEEP_MULT$§! decreased by §G-10%§!."
tr_est_militarism_4_delayed:0 "War is not won by weapons alone and we know this. The office of organization is responsible for the logistics of our military forces."

tr_est_militarism_5:0 "Prestige of the Admiralty"
tr_est_militarism_5_desc:0 "We may maintain up to §Y5§! Admirals without it having any effect on our leader capacity. Increase the leader experience gain of all our admirals by §G+25%§!."
tr_est_militarism_5_delayed:0 "The admirals of the navy is some of the most respected individuals in our society. They hold positions of great influence, not only in the military, but also in the society as a whole."

tr_est_militarism_finish:0 "Militarism Traditions finished"
tr_est_militarism_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_militarism_adopt$ increases §Y$MOD_SHIP_WEAPON_RANGE_MULT$§! by §G+25%§!."

### Swap - Might ###

tradition_est_might:0 "Might"
tradition_est_might_desc:0 "Only through the strength of our armies can our presence in this galaxy be guaranteed."
tr_est_might_adopt:0 "Might Traditions"
tr_est_might_adopt_desc:0 "$tradition_est_might_desc$\n\n$tr_est_militarism_adopt_effect$\n\n$tr_est_might_finish_effect$"

tr_est_might_1:0 "Natural Warriors"
tr_est_might_1_desc:0 "§YGarrison Health§! increased by §G+300%§! and §Y$MOD_PLANET_ARMY_BUILD_COST_MULT$§! reduced by §G-33%§!."
tr_est_might_1_delayed:0 "The warrior instinct runs throughout all of our drones, when the time comes to fight each one of them will be ready."

tr_est_might_2:0 "Cunningness of the Predator"
tr_est_might_2_desc:0 "§YGeneral Skills§! increased by §Y2§!, §YGeneral Recruitment Cost§! reduced by §G-50%§! and §Y$MOD_ARMY_MORALE_DAMAGE_MULT$§! is increased by §G+20%§!."
tr_est_might_2_delayed:0 "Our military tactics seems unorthodox to the mortals of this galaxy, yet they are effective. Fear will grip the hearts of our enemies as they are faced with the incomprehensibility of our armies."

tr_est_might_4:0 "Fleet Synchronicity"
tr_est_might_4_desc:0 "§Y$MOD_SHIP_FIRE_RATE_MULT$§! increased by §G+5%§! and §Y$MOD_SHIP_COMBAT_SPEED_MULT$§! increased by §G+10%§!."
tr_est_might_4_delayed:0 "A fleet of ships, each one acting in total synchronicity. Each one able to, without delay, respond events anywhere in the battle. This is what our enemies have to deal with."

tr_est_might_5:0 "Naval Adaptability"
tr_est_might_5_desc:0 "We may maintain up to §Y5§! Admirals without it having any effect on our leader capacity. Increase the leader experience gain of all our admirals by §G+25%§!."
tr_est_might_5_delayed:0 "We have fought thousands of battles, for each one of them we analyse the inputs from every ship. With this wealth of information we can quickly adapt of naval tactics to each new opponent we are faced with."

tr_est_might_finish:0 "Might Traditions finished"
tr_est_might_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_might_adopt$ increases §Y$MOD_SHIP_WEAPON_RANGE_MULT$§! by §G+15%§! and §Y$MOD_SHIP_WEAPON_DAMAGE$§! by §G+5%§!."

################################################################
# MYSTICISM
################################################################
tradition_est_mysticism:0 "Mystery"
tradition_est_mysticism_desc:0 "Secrets and deceit ensure that only a few, if any, knows every detail of our society's workings."
tr_est_mysticism_adopt:0 "Mystery Traditions"
tr_est_mysticism_adopt_desc:0 "$tradition_est_mysticism_desc$\n\n$tr_est_mysticism_adopt_effect$\n\n$tr_est_mysticism_finish_effect$"
tr_est_mysticism_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_PLANET_SENSOR_RANGE_MULT$§! increased by §G+50%§!."

tr_est_mysticism_1:0 "Shroud of Secrecy"
tr_est_mysticism_1_desc:0 "§YFaction Influence Gain§! increased by §G+30%§! and §YRuler Level Cap§! increased by §G1§!."
tr_est_mysticism_1_democracy_shadow_council_desc:0 "§YFaction Influence Gain§! increased by §G+30%§! and §YElection Influence Cost§! decreased by §G-30%§!."
tr_est_mysticism_1_election_desc:0 "§YFaction Influence Gain§! increased by §G+30%§! and §YElection Influence Cost§! decreased by §G-50%§!."
tr_est_mysticism_1_delayed:0 "Our society is covered in a shroud of secrecy, and few know every detail of its workings. Positions of power are filled in an unclear manner. A large number of associations, organizations, guilds and parties with various responsibilities and unclear recruitment processes makes up the various layers of society."

tr_est_mysticism_2:0 "Guild of Navigators"
tr_est_mysticism_2_desc:0 "§Y$MOD_SHIP_INTERSTELLAR_SPEED_MULT$§! increased by §G+50%§! and §YEmergency FTL Damage§! decreased by §G-25%§!."
tr_est_mysticism_2_delayed:0 "The secretive guild of navigators are responsible for the navigation of all civil and military ships. Nonmembers are neither allowed nor able to handle our ships."

tr_est_mysticism_3:0 "Pursuit of the Forbidden Knowledge"
tr_est_mysticism_3_desc:0 "§Y$MOD_COUNTRY_PHYSICS_TECH_RESEARCH_SPEED$§! increased by §G+15%§!."
tr_est_mysticism_3_delayed:0 "Small collections of researchers gather in groups all over our realm to delve into topics that would often have been kept of limits in other empires."

tr_est_mysticism_4:0 "Rituals"
tr_est_mysticism_4_desc:0 "§Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! increased by §G+10%§! and §Y$MOD_COUNTRY_EDICT_LENGTH_MULT$§! increased by §G+10%§!."
tr_est_mysticism_4_delayed:0 "The daily lives of our citizens are filled with rituals. From rites of passage into the various stages of life to smaller acts of superstitions."

tr_est_mysticism_5:0 "Mystics"
tr_est_mysticism_5_desc:0 "All leaders gain the §YMystic§! trait which provides minor bonuses."
tr_est_mysticism_5_delayed:0 "Many powerful individuals in our society are attributed supernatural powers. Whenever these individuals really possess all the powers they are said to have is unknown."

tr_est_mysticism_finish:0 "Mystery Traditions finished"
tr_est_mysticism_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_mysticism_adopt$ increases §Y$MOD_SHIP_SHIELD_HP_MULT$§! by §G+15%§!."

### Swap - Philosophy ###

tradition_est_philosophy:0 "Philosophy"
tradition_est_philosophy_desc:0 "We are no mere force of nature, as the mortals seems to believe. We are possible the wisest being in the galaxy. Through eternity we have been contemplating the deepest mysteries of existence."

tr_est_philosophy_adopt:0 "Philosophy Traditions"
tr_est_philosophy_adopt_desc:0 "$tradition_est_philosophy_desc$\n\n$tr_est_philosophy_adopt_effect$\n\n$tr_est_philosophy_finish_effect$"
tr_est_philosophy_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_PLANET_SENSOR_RANGE_MULT$§! increased by §G+50%§!."

tr_est_philosophy_1:0 "The Nature of Mortality"
tr_est_philosophy_1_desc:0 "Foreign Empire £opinion  §YOpinion§! is increased by §G+25§!. §Y$MOD_SHIP_WEAPON_DAMAGE$§! by §G+10%§! while fighting mortal empires."
tr_est_philosophy_1_delayed:0 "Mortals are curious things. Their lives, so fickle. Their minds, so weak."
tr_est_philosophy_1_no_dip:0 "The Nature of Mortality"
tr_est_philosophy_1_no_dip_desc:0 "§Y$MOD_SHIP_WEAPON_DAMAGE$§! by §G+15%§! while fighting mortal empires."
tr_est_philosophy_1_no_dip_delayed:0 "Mortals are curious things. Their lives, so fickle. Their minds, so weak."

tr_est_philosophy_2:0 "The Nature of the Shroud"
tr_est_philosophy_2_delayed:0 "The Shroud is illusive, a part of our reality, yet not. What is its true nature?"

tr_est_philosophy_3:0 "The Nature of the Universe"
tr_est_philosophy_3_desc:0 "§Y$MOD_COUNTRY_PHYSICS_TECH_RESEARCH_SPEED$§! increased by §G+25%§!."
tr_est_philosophy_3_delayed:0 "When we first awoke, the universe were there. Long after we have gone to sleep, the universe will persist. Above all things, it is eternal."

tr_est_philosophy_4:0 "The Nature of Ourselves"
tr_est_philosophy_4_desc:0 "Our £unity  §YUnity§! output is increased by §G+10%§!."
tr_est_philosophy_4_delayed:0 "What is the reason for our existence? What force have awaken us in this world, and what force may put us to sleep? "

tr_est_philosophy_5:0 "The Nature of Existence"
tr_est_philosophy_5_desc:0 "§YGrowth Speed§! inceased by §G+15%§!."
tr_est_philosophy_5_delayed:0 "Why is there something, were there could have been nothing?"
tr_est_philosophy_5_machine:0 "The Nature of Existence"
tr_est_philosophy_5_machine_desc:0 "§YRobot Build Speed§! inceased by §G+15%§!."
tr_est_philosophy_5_machine_delayed:0 "Why is there something, were there could have been nothing?"

tr_est_philosophy_finish:0 "Mystery Traditions finished"
tr_est_philosophy_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_philosophy_adopt$ increases §Y$MOD_SHIP_SHIELD_HP_MULT$§! by §G+15%§!."

################################################################
# NATURE
################################################################
tradition_est_natural:0 "Nature"
tradition_est_natural_desc:0 "It was in nature that our lives began. As we reach for the stars we must hold unto our humble beginnings less we will lose our self. "
tr_est_natural_adopt:0 "Nature Traditions"
tr_est_natural_adopt_desc:0 "$tradition_est_natural_desc$\n\n$tr_est_natural_adopt_effect$\n\n$tr_est_natural_finish_effect$"
tr_est_natural_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_POP_GROWTH_SPEED$§! increased by §G+10%§!."

tr_est_natural_1:0 "Adaptive Society"
tr_est_natural_1_desc:0 "§Y$MOD_POP_ENVIRONMENT_TOLERANCE$§! increased by §G+10%§!."
tr_est_natural_1_delayed:0 "Rather than adapting our environment to us, we have learnt to adapt ourselves to our environment."

#tr_est_natural_2:0 "As a Fish Swims in the Sea"
#tr_est_natural_2_desc:0 "§Y$MOD_PLANET_FORTIFICATION_STRENGTH$§! increased by §G+100%§!."
#tr_est_natural_2_delayed:0 "As a Fish Swims in the Sea our armies move through the wilds of our home worlds. Using nature as a cover and striking out from it at our opponent's moment of weakness. We are the true masters of guerilla warfare."

tr_est_natural_2:0 "Natural Riches"
tr_est_natural_2_desc:0 "Every tile on any of our §YPlanets§! have a §G33%§! chance to generate an additional resource deposit."
tr_est_natural_2_delayed:0 "The nature around us is rich in resources that can be utilized by those that knows where to find them."

tr_est_natural_3:0 "One with Nature"
tr_est_natural_3_desc:0 "§Y$MOD_PLANET_CLEAR_BLOCKER_COST_MULT$§! decreased by §G-50%§!."
tr_est_natural_3_delayed:0 "Rather than pushing nature away to make way for our society we have learnt to build within it, with minimal need to devastate the nature to make room for ourselves."

tr_est_natural_4:0 "Self-Sustaining"
tr_est_natural_4_desc:0 "Our £food  §YFood§! output is increased by §G+15%§!."
tr_est_natural_4_delayed:0 "Rather than solely depending on centralized food production most individuals on our worlds are to some extent self-sustaining. To some extent they can produce their own food."

tr_est_natural_5:0 "Non-Consumerism"
tr_est_natural_5_desc:0 "§Y$MOD_POP_CONSUMER_GOODS_MULT$§! decreased by §G-15%§!."
tr_est_natural_5_delayed:0 "While others value material things we are above such inferior behavior."

tr_est_natural_finish:0 "Nature Traditions finished"
tr_est_natural_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_natural_adopt$ increases §Y$MOD_COUNTRY_SOCIETY_TECH_RESEARCH_SPEED$§! by §G+15%§!."

################################################################
# ORDER
################################################################
tradition_est_order:0 "Order"
tradition_est_order_desc:0 "Every being have their role in the grand scheme of things. It is everyone's duty to performs their assigned task."
tr_est_order_adopt:0 "Order Traditions"
tr_est_order_adopt_desc:0 "$tradition_est_order_desc$\n\n$tr_est_order_adopt_effect$\n\n$tr_est_order_finish_effect$"
tr_est_order_adopt_no_resettle_desc:0 "$tradition_est_order_desc$\n\n$tr_est_order_adopt_effect$\n\n$tr_est_order_finish_no_resettle_effect$"
tr_est_order_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§Y$MOD_POP_CONSUMER_GOODS_MULT$§! decreased by §G-15%§!."

tr_est_order_1:0 "Ministry of Propaganda"
tr_est_order_1_desc:0 "Supressing a §YFaction§! costs half the amount of £influence §YInfluence§! and only reduce £happiness  §YFaction Happiness§! by §G-10%§!. §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! increased by §G+10%§! on all planets with the §YPropaganda Broadcast§! §YEdict§!."
tr_est_order_1_delayed:0 "The truth that the people know shall be the truth that we desire them to know. Our ministry of propaganda ensures that this is the case."

tr_est_order_2:0 "State Sanctioned Parties"
tr_est_order_2_desc:0 "The £happiness  §YHappines§! of all §YFactions§! is increased by §G+3%§!."
tr_est_order_2_delayed:0 "Rather than people are free to form any political party that they desire we have instituted a set of approved parties with fixed agendas that are allowed to join for."

tr_est_order_3:0 "Standardized Work Schedules"
tr_est_order_3_desc:0 "Our £food  §YFood§! and £minerals  §YMineral§! output is increased by §G+5%§!."
tr_est_order_3_slavery_desc:0 "§Y$MOD_POP_SLAVE_MINERAL_OUTPUT$§! increased by §G+15%§!."
tr_est_order_3_delayed:0 "To better organize our workforce we have standardized the work schedules. Two workers working the same job will do so under the same conditions independently of where they do it."

tr_est_order_4:0 "Planned Procreation"
tr_est_order_4_desc:0 "§Y$MOD_POP_GROWTH_SPEED$§! increased by §G+15%§!."
tr_est_order_4_delayed:0 "Until now procreation have been free and unregulated. As our empire expands we can no longer afford these uncertainties in population growth. Each year the local government will make a plan on how many new individuals are to be born and designate citizens to produce those new individuals."

tr_est_order_5:0 "Keeping the Order"
tr_est_order_5_desc:0 "§HUnlocks Army:§! $est_police_force$. §Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-10%§! on all our planets."
tr_est_order_5_delayed:0 "There are those that disagree with our way of government. By instituting special police forces to keep the order on our world we can humble any dissidents."

tr_est_order_finish:0 "Order Traditions finished"
tr_est_order_finish_no_resettle:0 "Order Traditions finished"
tr_est_order_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_order_adopt$ decreases §Y$MOD_COUNTRY_RESETTLEMENT_COST_MULT$§! by §G-20%§!."
tr_est_order_finish_no_resettle_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_order_adopt$ increase §Y$MOD_POP_HAPPINESS$§! and §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! by §G+5%§!."

### Swap - Cooperativity ###

tradition_est_cooperativity:0 "Cooperativity"
tradition_est_cooperativity_desc:0 "While each drone lacks advanced mentalities, through cognitive cooperativity their intellectual abilities are amplified greatly. In this way large numbers of drones can complete advanced tasks without input from the mind."
tr_est_cooperativity_adopt:0 "Cooperativity Traditions"
tr_est_cooperativity_adopt_desc:0 "$tradition_est_cooperativity_desc$\n\n$tr_est_cooperativity_adopt_effect$\n\n$tr_est_cooperativity_finish_effect$"
tr_est_cooperativity_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nIncrease §YResource Output§! by §G+3/6/10%§! on planets with at least §Y16/20/24§! £pop  §YPops§!."

tr_est_cooperativity_1:0 "Warrior Clusters"
tr_est_cooperativity_1_desc:0 "§Y$MOD_ARMY_DAMAGE_MULT$§! increased by §G+20%§! and §Y$MOD_ARMY_UPKEEP_MULT$§! decreased by §G-10%§!."
tr_est_cooperativity_1_delayed:0 "Warriors are groups into small clusters to ensure that warrior drones are not isolated. As long as they are fighting in groups they can utilize cooperativity to enhance their tactical sense and improve combat performance."

tr_est_cooperativity_2:0 "Worker Teams"
tr_est_cooperativity_2_desc:0 "Our £food  §YFood§! and £minerals  §YMineral§! output is increased by §G+5%§!."
tr_est_cooperativity_2_delayed:0 "Work drones are grouped into carefully designed teams were each individual drone can contribute with complementary mental capacities to the local mind network. This will increase work efficiency."

tr_est_cooperativity_2_machines:0 "$tr_est_cooperativity_2$"
tr_est_cooperativity_2_machines_desc:0 "Our £energy  §YEnergy§! and £minerals  §YMineral§! output is increased by §G+5%§!."
tr_est_cooperativity_2_machines_delayed:0 "$tr_est_cooperativity_2_delayed$"

tr_est_cooperativity_3:0 "Input Sharing"
tr_est_cooperativity_3_desc:0 "§YLeader Experience Gain§! increased by §G+20%§!."
tr_est_cooperativity_3_delayed:0 "Autonomous drones may integrate themselves into local drone networks, taking part in and learning from their stored sensory inputs."

tr_est_cooperativity_4:0 "Cognition Centrals"
tr_est_cooperativity_4_desc:0 "All leaders gain the §YCognition Central§! trait which provides minor bonuses."
tr_est_cooperativity_4_delayed:0 "Autonomous drones have much higher cognitive capacity than normal drones. By integrating themselves into local drone networks they may amplify their capabilities greatly."

tr_est_cooperativity_5:0 "Growth Phases"
tr_est_cooperativity_5_desc:0 "Increase §YGrowth Speed§! by §G+5%§!. Enables the §YGrowth Phase§! planetary edict, which increases §YGrowth Speed§! by §G+45%§! while reducing §YResource Output§! by §R-10%§! and increasing §YFood Consumption§! by §R+25%§!."
tr_est_cooperativity_5_delayed:0 "To reduce the disadvantages of low drone numbers a colony can enter a special growth phase, reducing drone capacity but greatly increasing production rates."

tr_est_cooperativity_5_machines:0 "$tr_est_cooperativity_5$"
tr_est_cooperativity_5_machines_desc:0 "Increase §YRobot Build Speed§! by §G+5%§!. Enables the §YRobot Build Phase§! planetary edict, which increases §YRobot Build Speed§! by §G+45%§! while reducing §YResource Output§! by §R-10%§! and increasing §YRobot Upkeep§! by §R+25%§!."
tr_est_cooperativity_5_machines_delayed:0 "$tr_est_cooperativity_5_delayed$"

tr_est_cooperativity_finish:0 "cooperativity Traditions finished"
tr_est_cooperativity_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_cooperativity_adopt$ makes new colonies start with §Y1§! additional £pops  Pop."

################################################################
# PROSELYTISM
################################################################
tradition_est_proselytism:0 "Proselytism"
tradition_est_proselytism_desc:0 "Our ideals and way of life is naturally superior to that of others. It is our duty to spread it through the galaxy."
tr_est_proselytism_adopt:0 "Proselytism Traditions"
tr_est_proselytism_adopt_desc:0 "$tradition_est_proselytism_desc$\n\n$tr_est_proselytism_adopt_effect$\n\n$tr_est_proselytism_finish_effect$"
tr_est_proselytism_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nThe £unity  §YUnity§! output is increased by §G+15%§! and the £happiness  §Y$MOD_POP_HAPPINESS$§! is increased by §G+5%§! on all our §YPlanets§! were all non slave £pops  Pops belongs to one of our §YEthics§!."

tr_est_proselytism_1:0 "Missionaries"
tr_est_proselytism_1_desc:0 "Increase §YEthic Attraction§! towards our §YEthics§! by §G+25%§! in all neighbouring empires (effect doubled for §YFanatic Ethics§!). §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! increased by §G+5%§!."
tr_est_proselytism_1_delayed:0 "Our missionaries travels to the worlds at the fringe of our empire, at the worlds of our neighbors empires. There they will convert the populace to the right path."

tr_est_proselytism_2:0 "Crusades"
tr_est_proselytism_2_desc:0 "Increases §Y$MOD_SHIP_FIRE_RATE_MULT$§! by §G+10%§!, §Y$MOD_ARMY_MORALE$§! by §G+25%§!, §Y$MOD_NAVY_SIZE_MULT$§! by §G+15%§! and §Y$MOD_SPACEPORT_SHIP_BUILD_SPEED_MULT$§! by §G+15%§! while we are in a §YWar§! with a §YWar Leader§! which have at least one opposing §YEthos§!."
tr_est_proselytism_2_delayed:0 "For those that refuse to see the truth in our words there is only one option, to change their minds by force. After all, it is only for their own best."

tr_est_proselytism_3:0 "Assimilation Policy"
tr_est_proselytism_3_desc:0 "Conquered £pops  §YPops§! receive no §YRecently Conquered§! penalty."
tr_est_proselytism_3_delayed:0 "As more people are included in our empire with must take measures to ensure that they are properly and thoroughly assimilated into our society."

tr_est_proselytism_4:0 "Ordo Patria"
tr_est_proselytism_4_desc:0 "Increase §YEthic Attraction§! towards our §YEthics§! by §G+25%§! in all our §YSubject§! empires (effect doubled for §YFanatic Ethics§!). §Y$MOD_COUNTRY_EDICT_LENGTH_MULT$§! increased by §G+15%§!."
tr_est_proselytism_4_delayed:0 "The Ordo Patria is tasked with ensuring that all our citizens show proper love for our homeland. Its representatives will also travel to our subjects and ensure that they to follow our ideals."

tr_est_proselytism_5:0 "Exceptionalism"
tr_est_proselytism_5_desc:0 "Increase The £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  §YPops§! by §G+5%§! and our £unity  §YUnity§! output increased by §G+15%§! for §G10§! years after winning a §YWar§!. The bonus is lost whenevr a §YWar§! is lost."
tr_est_proselytism_5_delayed:0 "Our empire is truly superior to that of others, this we know. All but the misguided other empires in the galaxy should strive to be included in ours, or to emulate it. Eventually we will show the misguided their inferiority."

tr_est_proselytism_finish:0 "Proselytism Traditions finished"
tr_est_proselytism_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_proselytism_adopt$ increases §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! by §G+15%§!."

################################################################
# PURITY
################################################################
tradition_est_purity:0 "Purity"
tradition_est_purity_desc:0 "A star nation built on the rotten foundation of xeno inclusion will inevitably collapse."
tr_est_purity_adopt:0 "Purity Traditions"
tr_est_purity_adopt_desc:0 "$tradition_est_purity_desc$\n\n$tr_est_purity_adopt_effect$\n\n$tr_est_purity_finish_effect$"
tr_est_purity_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\nOur £unity  §YUnity§! output is increased by §G+10%§! on planets without xeno £pops  Pops. The £happiness  §Y$MOD_POP_HAPPINESS$§! of all our £pops  Pops is increased by §G+5%§! while our empire do not contain any xeno £pops  Pops."

tr_est_purity_1:0 "The Chosen"
tr_est_purity_1_desc:0 "Reduce §YUpkeep§! of §YColonies§! and §YColony Ships§! by §G-75%§!. Gain §G100§! £unity §YUnity§! whenever a planet is successfully colonized."
tr_est_purity_1_delayed:0 "We are the chosen people. The Galaxy is ours by right and we must reach out and claim it."

tr_est_purity_2:0 "Planetary Cleansing"
tr_est_purity_2_desc:0 "§Y$MOD_COUNTRY_TERRAFORM_SPEED_MULT$§! is increased by §G+25%§! and §Y$MOD_FLEET_TERRAFORMING_COST_MULT$§! is reduced by §G-15%§!."
tr_est_purity_2_delayed:0 "As new planets are colonized they must be cleansed of every trace of xeno life. We have developed a meticulous process of planetary cleansing to be employed on every world before settlers are allowed to move in."

tr_est_purity_3:0 "Ordo Inquisitio"
tr_est_purity_3_desc:0 "§Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-10§! on all our planets and §Y$MOD_POP_GOVERNMENT_ETHIC_ATTRACTION$§! is increased by §G+10%§!."
tr_est_purity_3_delayed:0 "Our feared inquisitors, representatives of the Ordo Inquisitio, travels from world to world. They search for any form of xeno infestation, whenever it is xeno beings or heretical ideas of the mind. Everything they find they have full authority to remove."

tr_est_purity_4:0 "Exterminatus"
tr_est_purity_4_desc:0 "§Y$MOD_ARMY_DAMAGE_MULT$§! increased by §G+10%§!, §Y$MOD_SHIP_FIRE_RATE_MULT$§! increased by §G+5%§! and §Y$pop_ethic_xenophobe_attraction_mult$§! increased by §G+10%§!."
tr_est_purity_4_delayed:0 "Eventually all xenos in the galaxy will need to be exterminated. It is a monumental task that lies before us but we will not hesitate."

tr_est_purity_5:0 "Pure Mind, Pure Body"
tr_est_purity_5_desc:0 "§YLeader Lifespan§! increased by §G+10§! years and §Y$MOD_POP_FOOD_REQ_MULT$§! decreased by §G-5%§!."
tr_est_purity_5_delayed:0 "As our society must be purged from foreign beings and ideas every individual must hold unto a virtuous lifestyle, less corruption will take hold. Provisions are strictly limited to foods that are considered pure, while many dubious and frivolous activities are forbidden or heavily frowned upon."

tr_est_purity_finish:0 "Purity Traditions finished"
tr_est_purity_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_purity_adopt$ increases §Y$MOD_COUNTRY_BORDER_MULT$§! by §G+15%§! and §Y$MOD_COUNTRY_MAX_RIVALRIES$§! is increased by §G1§!."

