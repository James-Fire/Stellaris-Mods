tr_est_faith_3:0 "Deus Vult"
tr_est_faith_3_desc:0 "§Y$MOD_ARMY_MORALE$§! increased by §G+25%§! and §Y$MOD_SHIP_WEAPON_DAMAGE$§! increased by §G+5%§!."
tr_est_faith_3_delayed:0 "In war our cause is justified by the divines. Our warriors stand ready to die for their belief."

tr_est_faith_4:0 "Preachers"
tr_est_faith_4_desc:0 "§Y$MOD_COUNTRY_EDICT_LENGTH_MULT$§! increased by §G+25%§!."
tr_est_faith_4_delayed:0 "Preachers travels our empire to preach the holy message as told by our highest priests and prophets. This ensures that their words reach the great masses."

tr_est_faith_5:0 "Holy Scripts"
tr_est_faith_5_desc:0 "§Y$MOD_PLANET_UNREST_ADD$§! is reduced by §G-15§! on all our planets."
tr_est_faith_5_delayed:0 "Holy Scripts that contains the core of our belief shall be written and distributed to all our citizens."

tr_est_faith_finish:0 "Faith Traditions finished"
tr_est_faith_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_faith_adopt$ increases §Y$pop_ethic_spiritualist_attraction_mult$§! by §G+10%§! and the £happiness  §Y$MOD_POP_HAPPINESS$§! of all £pops  §YPops§! is increased by §G+5%§!."

### Swap - Purposefullness ###
tradition_est_purposefullness:0 "Purposefullness"
tradition_est_purposefullness_desc:0 "Our presence in this galaxy is no chance. We are here for a reason, to fulfil our purpose."
