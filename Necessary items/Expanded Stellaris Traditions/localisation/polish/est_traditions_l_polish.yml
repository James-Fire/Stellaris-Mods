tr_est_industry_2_delayed:0 "We have since long learnt the art of establishing special forge worlds. These are world dedicated to our mines and industries and are able to out-produce almost any other planet in the galaxy."

tr_est_industry_3:0 "Grand Forgeries"
tr_est_industry_3_desc:0 "§HUnlocks Building:§! $building_est_blast_furnace$.\n(Planet Unique, produces §Y5§! £minerals §YMinerals§! and provides §Y3§! £minerals §YMinerals§! in adjacency bonus)"
tr_est_industry_3_delayed:0 "Our Blast Furnaces are larger than any other in the galaxy. They are able to refine immense quantities of metal ore and produce good, high quality, metal."

tr_est_industry_4:0 "Mass Production"
tr_est_industry_4_robots:0 "Mass Production"
tr_est_industry_4_desc:0 "§Y$MOD_SPACEPORT_SHIP_BUILD_SPEED_MULT$§! increased by §G+25%§!."
tr_est_industry_4_robots_desc: "§Y$MOD_POP_ROBOT_BUILD_SPEED_MULT$§! increased by §G+20%§!."
tr_est_industry_4_delayed:0 "Our factories are able to mass produce standardized components at a high pace, which then can be used to build the ships needed by our fleet."
tr_est_industry_4_robots_delayed:0 "Our factories are able to mass produce standardized components at a high pace, which then can be used to build the robots needed by our nation."

tr_est_industry_5:0 "Industrial Revolution"
tr_est_industry_5_desc:0 "Our £minerals  §YMineral§! output is increased by §G+10%§!."
tr_est_industry_5_delayed:0 "Through a combination of new mining techniques and our new high technology factories we have entered an industrial revolution."

tr_est_industry_finish:0 "Industry Traditions finished"
tr_est_industry_finish_effect:0 "§E$TRADITIONS_FINISH$:§!\nAdopting all $tr_est_industry_adopt$ increases §YMineral Storage Capacity§! by §G5000§!. It will also unlock the §Y$edict_est_industry_finish$§! planetary edict which will increase a planets £minerals  §YMineral§! output by §G+20%§! while reducing §Y$MOD_POP_ENVIRONMENT_TOLERANCE$§! by §R-10%§! and §Y$MOD_POP_GROWTH_SPEED$§! by §R-20%§!."

