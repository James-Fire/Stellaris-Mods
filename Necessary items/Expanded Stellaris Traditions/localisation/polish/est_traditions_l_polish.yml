tr_est_purposefullness_3_delayed:0 "The completion of the task is paramount, damage to the other beings of the galaxy might be unfortunate, but inconsequential."

tr_est_purposefullness_4:0 "Ingrained Drone Reflexes"
tr_est_purposefullness_4_delayed:0 "Even the most insignificant of drones have a basic sense of the purpose, which guides them to better complete their mundane tasks."

tr_est_purposefullness_5:0 "Determination"
tr_est_purposefullness_5_desc:0 "§Y$MOD_POP_GROWTH_SPEED$§! increased by §G+15%§! and §Y$MOD_SHIP_COMBAT_SPEED_MULT$§! increased by §G+15%§!."
tr_est_purposefullness_5_delayed:0 "We will neither hesitate nor will we fail. We will succeed."

tr_est_purposefullness_finish:0 "Purposefullness Traditions finished"
