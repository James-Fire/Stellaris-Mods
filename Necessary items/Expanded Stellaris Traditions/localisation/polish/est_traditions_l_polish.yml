tr_est_industry_adopt_effect:0 "§E$TRADITIONS_ADOPT$:§!\n§YResearch Speed (Industry)§! increased by §G+15%§!. We may build an additional £building  §YMineral Silo§! on each planet."

tr_est_industry_1:0 "New Prospecting Techniques"
