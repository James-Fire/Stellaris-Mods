     d_stargate:0 "Stargate"
     d_stargate_desc:0 "Research into localising the wormholes has enabled the creation of tempory wormholes within the gravity well of the planet, allowing rapid trade, military reinforcement, civilian transport, governmental transport, and easier administration of all connected worlds."
