     tech_hyperconductors_4a_desc:0 "Enlarging hyperconducting firing coils, and providing all the necessary power to ensure it doesn't explode, was a bigger problem than we initially anticipated."
     tech_void_afterburners:0 "Void Afterburners"
     tech_void_afterburners_desc:0 "The magnetic cylinders currently used in thrusters are capable of outputting so much more thrust, we just need to realize it."
     

