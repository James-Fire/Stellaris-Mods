 #Techs

     tech_hyperconductors_1:0 "Hyperconductors"
     tech_hyperconductors_1_desc:0 "The basic theory and application of hyperconductor technology."
     tech_hyperconductors_2e:0 "Wormhole Reactor"
     tech_hyperconductors_2e_desc:0 "Utilizing hyperconductors to generate and contain a stable wormhole, energy is able to be drawn out, making as new generation of power sources."
     tech_hyperconductors_2:0 "Void Particle beams"
     tech_hyperconductors_2_desc:0 "Using wormhole reactors to power particle beam weapons is very effective."
