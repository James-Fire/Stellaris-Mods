 #Deposits and Districts
 
    d_liquid_tiberium_pool:0 "Liquid Tiberium Pool"
    d_liquid_tiberium_pool_desc:0 "A pool of liquid tiberium. Given the unstable nature of said liquid, this could explode at any moment."
 
    d_blue_zone:0 "Blue Zone"
    d_blue_zone_desc:0 "A pristine landscape, these areas are where the planet looks as it did before Tiberium infestation. It is where the 'conventional' industries still thrive."
    mod_district_blue_zone_max:0 "Max Blue Zone Districts"
    d_yellow_zone:0 "Yellow Zone"
    d_yellow_zone_desc:0 "Yellow zones are areas with Tiberium encroachment. Occupants are able to go outdoors without protection, but only at high risk of Tiberium exposure. Wildlife and plant life is scarce and dying, or mutating due to Tiberium exposure. Occassional Ion Storms blow in from nearby Red Zones, playing havoc with unshielded electronics."
    mod_district_yellow_zone_max:0 "Max Yellow Zone Districts"
    d_red_zone:0 "Red Zone"
    d_red_zone_desc:0 "Red Zones are overrun with Tiberium. Blue Tiberium is a more common sight in these zones, and large fields of Green Tiberium are everywhere. Ion Storms frequently ravage these zones, playing havoc with unshielded electronic systems. Any occupants live in heavily reinforced structures and venture outside only in sealed suits. Any breach of a suit usually results in the death of the individual due to heavy Tiberium exposure."
    mod_district_red_zone_max:0 "Max Red Zone Districts"
    
