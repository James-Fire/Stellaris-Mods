l_english:

 #Events
 
    tiberium.0.name:0 "Odd Glowing Asteroid Sighted"
    tiberium.0.desc:0 "An asteroid has been sighted heading for [Root.GetName]. It appears to be glowing green."
    tiberium.2.name:0 "Glowing Asteroid Destroyed"
    tiberium.2.desc:0 "The asteroid has been destroyed, and the colony saved."
    tiberium.3.name:0 "Impact!"
    tiberium.3.desc:0 "The glowing asteroid has impacted [Root.GetName]. We can choose to study it or remove it before something happens."
    tiberium.3.option.1:0 "Study it."
    tiberium.3.option.2:0 "Collect the material. Maybe we can use it for something."
    tiberium.3.option.3:0 "Remove that thing before it does something!"
    tiberium.6.name:0 "Science Report"
    tiberium.6.desc:0 "Our scientists working with the glowing asteroid have compiled a report for perusal."
    tiberium.6.option.1:0 "They need more funding!"
    tiberium.6.option.2:0 "Let me know next time they have something."
    
    tiberium.8.title:0 "Tiberium Growth"
    tiberium.8.desc:0 "The tiberium on our planet [Root.GetName] has spread. It grows rapidly and is highly poisonous to life."
    
    tiberium.10.name:0 "Depleted Planet"
    tiberium.10.desc:0 "The planet [Root.GetName] appears to have all tiberium growth stopped. All surveys we can do point to it having extracted all useful minerals."


    tiberium.30.name:0 "Red Zone Cleanup successful!"
    tiberium.30.desc:0 "
    tiberium.31.name:0 "Yellow Zone Cleanup successful!"
    tiberium.31.desc:0 "
    tiberium.32.name:0 "Red Zone Full Cleanup Successful!"
    tiberium.32.desc:0 "
    
    
    tiberium_infest.5.name:0 "An odd deposit"
    tiberium_infest.5.desc:0 "The tiberium on our planet [Root.GetName] seems to have made a lake of its liquid form. For what purpose, we can only imagine."
    
    tiberium_traits.2.name:0 "A pop has Mutated"
    tiberium_traits.2.desc:0 "A pop on [planet.GetName] has progressed to the mutation stage of tiberium exposure."
    tiberium_traits.3.name:0 "A pop has been Infested"
    tiberium_traits.3.desc:0 "A pop on [planet.GetName] has progressed to the infestation stage of tiberium exposure. They are beyond helping. We will have to let the tiberium run its course."
    tiberium_traits.4.name:0 "A pop has been Infected"
    tiberium_traits.4.desc:0 "A pop on [planet.GetName] has been infected from tiberium exposure. They may die soon."
    tiberium_traits.5.name:0 "A pop has Died"
    tiberium_traits.5.desc:0 "A pop on [planet.GetName] has died of tiberium exposure."
 
 #Techs, Resources, Traits, and Planets
    tech_tiberium_refining:0 "Improved Tiberium Refining"
    tech_tiberium_refining_desc:0 "Advanced refining techniques allow handling of greater amounts of tiberium in the same facility, even without expansion of the refinery."
    tech_tiberium_refining_2:0 "Advanced Tiberium Refining"
    tech_tiberium_refining_2_desc:0 "New materials and protocals allow much larger amounts of tiberium to be kept together without fear of catastrophic interaction."    
    
    tech_tiberium_green:0 "Exploit Green Tiberium"
    tech_tiberium_green_desc:0 "Tiberium Riparius is the most basic form of Tiberium. Its crystals are small and green in appearance, thus it is commonly referred to as green Tiberium. This type of Tiberium has a relatively low level of leeched minerals and is, therefore, the least valuable resource, albeit the most available. Tiberium Riparius grows and spreads very fast."
    tech_tiberium_blue:0 "Exploit Blue Tiberium"
    tech_tiberium_blue_desc:0 "After some time, developed Riparius crystals mature into Tiberium Vinifera, which is blue in appearance, and has crystals about the same size as Riparius. Vinifera is commonly referred to as "blue Tiberium" because of its color. This Tiberium spreads more slowly than Riparius, has much greater mineral density, and is highly combustable. As such, special harvesting and refining methods are required for exploitation."
    tech_tiberium_liquid:0 "Exploit Liquid Tiberium"
    tech_tiberium_liquid_desc:0 "Liquid Tiberium is an extremely potent and unstable form that has an extremely high energy density yield. Special care and equipment is needed to exploit this resource."
    tech_tiberium_liquid_power:0 "Liquid Tiberium Power"
    tech_tiberium_liquid_power_desc:0 "Just as with antimatter reactors, Liquid Tiberium can be used for a constructive purpose. The unstable and potent nature of the liquid makes it excellent reactor fuel."
    tech_tiberium_protection:0 "Tiberium Gear"
    tech_tiberium_protection_desc:0 "Protective gear that reduces contact with harmful tiberium, as well as advanced medical treatments to combat Tiberium exposure."
    
    tech_tiberium_kinetics:0 "Tiberium Stabilization"
    tech_tiberium_kinetics_desc:0 "Stabilize the tiberium enough that it can be shot out of railguns, or similar kinetic wepons."
    tech_tiberium_ionization:0 "Tiberium Ionization"
    tech_tiberium_ionization_desc:0 "Using ions derived from tiberium, we can make incredibly powerful particle beams."
    tech_tiberium_missile_core:0 "Liquid Tiberium Cores"
    tech_tiberium_missile_core_desc:0 "Liquid tiberium is very volatile, and as such is ideal for missile payloads."
    
    tech_tiberium_sonics:0 "Sonic Tiberium Removal"
    tech_tiberium_sonics_desc:0 "Since tiberium is a crystal, we can shatter it using sound. All we have to do is find its resonant frequency."
    
    sr_tiberium_green:0 "Green Tiberium"
    sr_tiberium_green_desc:0 "Tiberium Riparius is the most basic form of Tiberium. Its crystals are small and green in appearance, thus it is commonly referred to as green Tiberium. This type of Tiberium has a relatively low level of leeched minerals and is, therefore, the least valuable resource, albeit the most available. Tiberium Riparius grows and spreads very fast."
    sr_tiberium_blue:0 "Blue Tiberium"
    sr_tiberium_blue_desc:0 "After some time, developed Riparius crystals mature into Tiberium Vinifera, which is blue in appearance, and has crystals about the same size as Riparius. Vinifera is commonly referred to as "blue Tiberium" because of its color. This Tiberium spreads more slowly than Riparius, has much greater mineral density, and is highly combustable."
    sr_tiberium_liquid:0 "Liquid Tiberium"
    sr_tiberium_liquid_desc:0 "Tiberium that has liquified due to heating and/or pressure. Liquid Green Tiberium takes a field's worth of Tiberium Riparius and combines it into one continuous, material rich, and volatile form."
    
    mod_country_resource_max_sr_tiberium_green_add:0 "Green Tiberium Storage"
    mod_country_resource_max_sr_tiberium_blue_add:0 "Blue Tiberium Storage"
    mod_country_resource_max_sr_tiberium_liquid_add:0 "Liquid Tiberium Storage" 
    
    trait_pc_habitable_tiberium_preference:0 "Habitable Tiberium Preference"
    trait_pc_uninhabitable_tiberium_preference:0 "Tiberium World Preference"
    
    pc_habitable_tiberium:0 "Habitable Tiberium World"
    pc_habitable_tiberium_desc:0 "A habitable planet infected with tiberium. It may still be possible to live here, depending on how far along the infestation has progressed."
    pc_uninhabitable_tiberium:0 "Uninhabitable Tiberium World"
    pc_uninhabitable_tiberium_desc:0 "An uninhabitable planet that has been infected with tiberium. The value of this crystal is enough to convince several groups to live here."
    pc_tiberium_depleted:0 "Depleted Tiberium World"
    pc_tiberium_depleted_desc:0 "A desolate world, drained of its mineral wealth by tiberium. Terraforming is possible, but will be expensive."
 
 #Decisions and Policies
 
    infect_planet_green:0 "Green Tiberium Seed"
    infect_planet_green_desc:0 "Infect this planet with green tiberium, to start the process."
    infect_planet_blue:0 "Blue Tiberium Seed"
    infect_planet_blue_desc:0 "Infect this planet with blue tiberium, to start the process at a later stage."
    infect_planet_liquid:0 "Liquid Tiberium Seed"
    infect_planet_liquid_desc:0 "Infect this planet with liquid tiberium, to start the process with lots of tiberium."
    infect_habitable_planet_green:0 "Green Tiberium Seed"
    infect_habitable_planet_green_desc:0 "Infect this planet with green tiberium, to start the process."
    infect_habitable_planet_blue:0 "Blue Tiberium Seed"
    infect_habitable_planet_blue_desc:0 "Infect this planet with blue tiberium, to start the process at a later stage."
    infect_habitable_planet_liquid:0 "Liquid Tiberium Seed"
    infect_habitable_planet_liquid_desc:0 "Infect this planet with liquid tiberium, to start the process with lots of tiberium."
    seed_tiberium:0 "Seed Tiberium"
    seed_tiberium_desc:0 "Spread liquid tiberium over the surface to accelerate tiberium growth. It will need a bit of time to fully see the results."
    
    tiberium_clean_pops:0 "Remove Tiberium Infection"
    tiberium_clean_pops_desc:0 "There are some pops on this planet that are infected with tib. We can help them. And slow down those that are infested, even if we can't stop it."
    
    red_to_yellow_zone:0 "Red Zone Cleanup"
    red_to_yellow_zone_desc:0 "Clean up a red zone enough that we can officially class it as a yellow zone."
    yellow_to_blue_zone:0 "Yellow Zone Cleanup"
    yellow_to_blue_zone_desc:0 "Clean up a yellow zone to allow settling as a blue zone."
    red_to_blue_zone:0 "Red Zone Full Cleanup"
    red_to_blue_zone_desc:0 "Fully clean a red zone into a blue zone."
    
    yellow_to_blue_zone_sonic:0 "Sonic Yellow Zone Cleanup"
    yellow_to_blue_zone_sonic_desc:0 "Using sonic weaponry, we can clear all the tiberium out of this area."
    red_to_blue_zone_sonic:0 "Sonic Red Zone Cleanup"
    red_to_blue_zone_sonic_desc:0 "Using sonic weaponry, we can clear all the tiberium out of this area."
	
	tiberium_sonic_protection:0 "Sonic Protection"
	tiberium_sonic_protection_desc:0 "Utilize sonics to protect against tiberium on this world. Acts as though 10 harvester jobs exist, and reduces the max allowed deposit changes by 1. On non-tib worlds, also makes it 2.5x harder for Red Zones to appear."
	tiberium_sonic_protection_remove:0 "Remove Sonic Protection"
	tiberium_sonic_protection_remove_desc:0 "Dismantle the sonic equipment here."
    
    policy_tiberium_harvest:0 "Tiberium Harvest"
    policy_tiberium_harvest_desc:0 "Control the relative speed at which tiberium is harvested."
    Underharvest:0 "Underharvest"
    Underharvest_desc:0 "Harvest less tiberium than grows, allowing it to continue spreading."
    sustainable_harvest:0 "Sustainable Harvest"
    sustainable_harvest_desc:0 "Keep pace with tiberium grow to maintain current levels."
    Overharvest:0 "Overharvest"
    Overharvest_desc:0 "Aggressivley harvest Tiberium, to get maximum short-term income."
    underharvest_tiberium_name:0 "Underharvest"
    sustainable_harvest_tiberium_name:0 "Sustainable Harvest"
    overharvest_tiberium_name:0 "Overharvest"
    Overharvest_name:0 "Overharvest"
    
    policy_tiberium_use:0 "Tiberium Usage"
    policy_tiberium_use_desc:0 "Control how tiberium is used in the empire."
    Augmentation:0 "Augmentation"
    Augmentation_desc:0 "Attempt to use tiberium to augment our species'."
    tiberium_augmentation_name:0 "Augmentation"
    Resource:0 "Resource"
    Resource_desc:0 "Use tiberium strictly as a resource."
    tiberium_resource_name:0 "Resource"
    Banned:0 "Banned"
    Banned_desc:0 "Ban use of tiberium, and actively seek to cleanse our planets."
    Banned_name:0 "Banned"
    tiberium_banned_name:0 "Banned"
    
    policy_tiberium_safety:0 "Tiberium Safety"
    policy_tiberium_safety_desc:0 "Define the safety protocols for harvesting tiberium."
    tiberium_safe_name:0 "Maximum Safety"
    Safe_desc:0 "Every safety protocal is taken in the harvest of tiberium. This will greatly reduce yield."
    tiberium_priority_safe_name:0 "High Safety"
    High_Safety:0 "High Safety"
    High_Safety_desc:0 "Most safety protocols are used. This will reduce yield."
    tiberium_balanced_safe_name:0 "Balance safety with production"
    Balance_safety_and_production:0 "Balance safety and production"
    Balance_safety_and_production_desc:0 "Use some safety protocols, and some production protocols. Yield is average."
    tiberium_minimal_safe_name:0 "Minimal Safety"
    Minimal_Safety:0 "Minimal Safety"
    Minimal_Safety_desc:0 "Disregard all except the biggest safety protocols. Yield increased."
    tiberium_no_safe_name:0 "No Safety"
    No_Safety:0 "No Safety"
    No_Safety_desc:0 "Workers are replaceable. Yield greatly increased."
    
    edict_tiberium_cleanup:0 "Tiberium Cleanup"
    edict_tiberium_cleanup_desc:0 "Put into place policies and incentives to clean up tiberium. Acts as though there are 10 additional harvester jobs for each planet."
    
 #Buildings
    
    tiberium_green_refinery:0 "Green Tiberium Refinery"
    tiberium_green_refinery_desc:0 "A building for refining green tiberium into usable material."
    tiberium_blue_refinery:0 "Blue Tiberium Refinery"
    tiberium_blue_refinery_desc:0 "A building for refining blue tiberium into usable material."
    liquid_tiberium_factory_green:0 "Green Liquid Tiberium Refinery"
    liquid_tiberium_factory_green_desc:0 "A building for manufacturing green tiberium into liquid tiberium."
    liquid_tiberium_factory_blue:0 "Blue Liquid Tiberium Refinery"
    liquid_tiberium_factory_blue_desc:0 "A building for manufacturing blue tiberium into liquid tiberium."
    liquid_tiberium_reactor:0 "Tiberium Power Plant"
    liquid_tiberium_reactor_desc:0 "A power plant that uses liquid tiberium as a fuel enhancer."
    liquid_tiberium_reactor_2:0 "Liquid Tiberium Reactor"
    liquid_tiberium_reactor_2_desc:0 "A reactor that uses liquid tiberium as fuel."
    building_initial_tiberium_research_lab:0 "Glowing Asteroid Research Lab"
    building_initial_tiberium_research_lab_desc:0 "A lab to research the glowing asteroid that landed on this planet. It has some containment procedures that may help."
    mod_building_initial_tiberium_research_lab_max:0 "Glowing Asteroid Research Lab"
    building_tiberium_threshold:0 "Threshold Tower"
    building_tiberium_threshold_desc:0 "This tower draws in Tiberium veins located underneath it and stores the materials inside."
    building_tiberium_harvester:0 "Tiberium Spike"
    building_tiberium_harvester_desc:0 "Harvests tiberium on this planet. The hosts won't mind."
    building_tiberium_farm:0 "Tiberium Spike"
    building_tiberium_farm_desc:0 "Seeds a small area with tiberium to farm. The hosts won't mind."
    building_tiberium_refinery:0 "Tiberium Refinery"
    building_tiberium_refinery_desc:0 "Place some tiberium refining operations on this planet. The hosts won't mind."
    
    tiberium_green_refinery_2:0 "Upgraded Green Refinery"
    tiberium_green_refinery_2_desc:0 "A more specialized building to house and refine Green Tiberium, taking up the same amount of space as a previous generation refinery."
    tiberium_green_refinery_3:0 "Tier 3 Green Refinery"
    tiberium_green_refinery_3_desc:0 "This refinery liquidizes the green tiberium by safely heating and melting the crystals, then extracts the valuable minerals from the liquid."
    tiberium_blue_refinery_2:0 "Upgraded Blue Refinery"
    tiberium_blue_refinery_2_desc:0 "A more specialized building to house and refine Green Tiberium, taking up the same amount of space as a previous generation refinery."
    tiberium_blue_refinery_3:0 "Tier 3 Blue Refinery"
    tiberium_blue_refinery_3_desc:0 "This reinforced refinery liquidizes the blue tiberium by safely heating and melting the crystals, then extracts the valuable minerals from the liquid."
    liquid_tiberium_factory_green_2:0 "Upgraded Liquid Green Factory"
    liquid_tiberium_factory_green_2_desc:0 "A more specialized building to house and refine Liquid Green Tiberium, taking up the same amount of space as a previous generation refinery."
    liquid_tiberium_factory_green_3:0 "Tier 3 Liquid Green Factory"
    liquid_tiberium_factory_green_3_desc:0 "This building stores large amounts of liquid green tiberium and extracts resources from it in highly efficient chambers."
    liquid_tiberium_factory_blue_2:0 "Upgraded Liquid Blue Factory"
    liquid_tiberium_factory_blue_2_desc:0 "A more specialized building to house and refine Liquid Blue Tiberium, taking up the same amount of space as a previous generation refinery."
    liquid_tiberium_factory_blue_3:0 "Tier 3 Liquid Blue Factory"
    liquid_tiberium_factory_blue_3_desc:0 "This refinery has reinforcing built in typically found in our antimatter reactors. It exploits the mineral rich qualities of Liquid Blue Tiberium at a rate previously unheard of."
    
