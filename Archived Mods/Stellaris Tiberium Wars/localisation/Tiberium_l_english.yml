l_english:

 #Events
 
    tiberium.0.name:0 "Odd Glowing Asteroid Sighted"
    tiberium.0.desc:0 "An asteroid has been sighted heading for [Root.GetName]. It appears to be glowing green."
    tiberium.0.a:0 "Let's deal with it."
    tiberium.0.aa:0 "Open Fire."
    tiberium.0.b:0 "Let's deal with it."
    tiberium.0.bb:0 "Open Fire."
    tiberium.2.name:0 "Glowing Asteroid Destroyed"
    tiberium.2.desc:0 "The asteroid has been destroyed, and the colony saved."
    tiberium.3.name:0 "Impact!"
    tiberium.3.desc:0 "The glowing asteroid has impacted [Root.GetName]. We can choose to study it, or remove it before something happens."
    tiberium.3.option.1:0 "Study it."
    tiberium.3.option.2:0 "Collect the material. Maybe we can use it for something."
    tiberium.3.option.3:0 "Remove that thing before it does something."
    tiberium.6.name:0 "Science Report"
    tiberium.6.desc:0 "Our scientists working with the glowing asteroid have compiled a report for perusal."
    tiberium.6.option.1:0 "They need more funding!"
    tiberium.6.option.2:0 "Let me know next time they have something."
    
    tiberium.8.title:0 "Encroaching Crystal"
    tiberium.8.desc:0 "The asteroid that hit our planet [Root.GetName] has started spreading the crystal contained within. It spreads rapidly, and is hostile to life."
    
    tiberium.12.title:0 "Receding Crystal"
    tiberium.12.desc:0 "The crystal infesting our planet [Root.GetName] has receded thanks to our efforts."
    
    tiberium.10.name:0 "Depleted Planet"
    tiberium.10.desc:0 "The planet [Root.GetName] appears to have all tiberium growth stopped. All surveys we can do point to it having extracted all useful minerals."


    tiberium.30.name:0 "Red Zone Cleanup successful!"
    tiberium.30.desc:0 "
    tiberium.31.name:0 "Yellow Zone Cleanup successful!"
    tiberium.31.desc:0 "
    tiberium.32.name:0 "Red Zone Full Cleanup Successful!"
    tiberium.32.desc:0 "
    
    
    tiberium_infest.5.name:0 "An odd deposit"
    tiberium_infest.5.desc:0 "The tiberium on our planet [Root.GetName] seems to have made a lake of its liquid form. For what purpose, we can only imagine."
    
    tiberium_traits.2.name:0 "A pop has Mutated"
    tiberium_traits.2.desc:0 "A pop on [planet.GetName] has progressed to the mutation stage of tiberium exposure."
    tiberium_traits.3.name:0 "A pop has been Infested"
    tiberium_traits.3.desc:0 "A pop on [planet.GetName] has progressed to the infestation stage of tiberium exposure. They are beyond helping. We will have to let the tiberium run its course."
    tiberium_traits.4.name:0 "A pop has been Infected"
    tiberium_traits.4.desc:0 "A pop on [planet.GetName] has been infected from tiberium exposure. They may die soon."
    tiberium_traits.5.name:0 "A pop has Died"
    tiberium_traits.5.desc:0 "A pop on [planet.GetName] has died of tiberium exposure."
    
    tiberium_traits.8.name:0 "A pop is killed for infestation"
    tiberium_traits.8.desc:0 "A pop on [planet.GetName] has been killed by our security forces, due to tiberium infestation."
    tiberium_traits.9.name:0 "Infected Pops Spread Tiberium"
    tiberium_traits.9.desc:0 "A number of pops containing tiberium on [This.GetName] have spread tiberium to this planet. We must deal with the situation."
    tiberium_traits.9.option_1:0 "Every pop that has some tiberium in them contributes to tiberium infestation on this planet."
    tiberium_traits.9.option_2:0 "Every pop that has some tiberium in them is killed."
    tiberium_traits.9.option_3:0 "Every pop that has some tiberium in them is killed, but first contributes to tiberium infestation on this planet."
    tiberium_traits.9.option_4:0 "No harmful effects on the planet, this time."
 
 #Techs, Resources, Traits, and Planets
    tech_tiberium_refining:0 "Improved Tiberium Refining"
    tech_tiberium_refining_desc:0 "Advanced refining techniques allow handling of greater amounts of tiberium in the same facility, even without expansion of the refinery."
    tech_tiberium_refining_2:0 "Advanced Tiberium Refining"
    tech_tiberium_refining_2_desc:0 "New materials and protocals allow much larger amounts of tiberium to be kept together without fear of catastrophic interaction."    
    
    tech_tiberium_green:0 "Exploit Green Tiberium"
    tech_tiberium_green_desc:0 "Tiberium Riparius is the most basic form of Tiberium. Its crystals are small and green in appearance, thus it is commonly referred to as green Tiberium. This type of Tiberium has a relatively low level of leeched minerals and is, therefore, the least valuable resource, albeit the most available. Tiberium Riparius grows and spreads very fast."
    tech_tiberium_blue:0 "Exploit Blue Tiberium"
    tech_tiberium_blue_desc:0 "After some time, developed Riparius crystals mature into Tiberium Vinifera, which is blue in appearance, and has crystals about the same size as Riparius. Vinifera is commonly referred to as "blue Tiberium" because of its color. This Tiberium spreads more slowly than Riparius, has much greater mineral density, and is highly combustable. As such, special harvesting and refining methods are required for exploitation."
    tech_tiberium_liquid:0 "Exploit Liquid Tiberium"
    tech_tiberium_liquid_desc:0 "Liquid Tiberium is an extremely potent and unstable form that has an extremely high energy density yield. Special care and equipment is needed to exploit this resource."

    tech_tiberium_protection:0 "Tiberium Gear"
    tech_tiberium_protection_desc:0 "Our intimate knowledge of Tiberium allows us to design effective protective personal equipment as well as building materials resistant to its effects, as well as medical treatments to cure our people of tiberium exposure, greatly increasing the habitability of Tiberium worlds."
    
    tiberium_protection_title:0 "
    tiberium_protection_desc:0 "
    
    tech_tiberium_liquid_power_1:0 "Liquid Tiberium Power"
    tech_tiberium_liquid_power_1_desc:0 "Liquid Tiberium retains its resource rich nature but gains the volatility of old chemical based fuel sources. Thus, it stands to reason Liquid Tiberium can be used to fuel power generators."
    tech_tiberium_liquid_power_2:0 "Compressed Fuel Rods"
    tech_tiberium_liquid_power_2_desc:0 "Like any other liquid, Liquid Tiberium can be compressed. We can use this ability to discover how to safely compress Liquid Tiberium into a more dense state, allowing for more efficient reaction and storage both."
    tech_tiberium_liquid_power_3:0 "Green Tiberium Powdering"
    tech_tiberium_liquid_power_3_desc:0 "We have discovered how to reduce Green Tiberium into a powder. With some effort, we can devise a way to safely store this powder without danger to the environment and personnel so it can be used in our Tiberium Reactors."
    tech_tiberium_liquid_power_4:0 "Blue Tiberium Powdering"
    tech_tiberium_liquid_power_4_desc:0 "Building on the principles of powdering Green Tiberium, research can be made into safely powdering Blue Tiberium crystals so it can be used in the same way."
    tech_tiberium_liquid_power_5:0 "Anti-Tiberium"
    tech_tiberium_liquid_power_5_desc:0 "All matter has an anti-matter. Given the reactions we know occur between other forms of matter and anti-matter, we always knew there could be an Anti-Tiberium, just our projections indicated an energy release greater than we could contain. That has now changed, and we are prepared to find this elusive 'Anti-Tiberium.'"
    
    tech_tiberium_kinetics_1:0 "Improved Mass Driver"
    tech_tiberium_kinetics_1_desc:0 "Operating the same as a standard mass driver, the Improved Mass Driver is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    tech_tiberium_kinetics_2:0 "Improved Coilgun"
    tech_tiberium_kinetics_2_desc:0 "Operating the same as a standard coilgun, the Improved Coilgun is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    tech_tiberium_kinetics_3:0 "Improved Railgun"
    tech_tiberium_kinetics_3_desc:0 "Operating the same as a standard railgun, the Improved Railgun is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    tech_tiberium_kinetics_4:0 "Improved Advanced Railguns"
    tech_tiberium_kinetics_4_desc:0 "Operating the same as a standard advanced railgun, the Improved Railgun is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    tech_tiberium_kinetics_5:0 "Improved Gauss Gun"
    tech_tiberium_kinetics_5_desc:0 "Operating the same as a standard gauss gun, the Improved Gauss Gun is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    
    tech_tiberium_kinetic_artillery_1:0 "Improved Kinetic Battery"
    tech_tiberium_kinetic_artillery_1_desc:0 "Operating the same as a standard kinetic battery, the Improved Kinetic Battery is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    tech_tiberium_kinetic_artillery_2:0 "Improved Kinetic Artillery"
    tech_tiberium_kinetic_artillery_2_desc:0 "Operating the same as a standard kinetic artillery, the Improved Kinetic Battery is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    tiberium_artillery_2:0 "Improved Kinetic Artillery"
    tiberium_artillery_2_DESC:0 "Operating the same as a standard kinetic artillery, the Improved Kinetic Battery is designed to use more power when launching the projectile, causing it to travel faster. This is only possible with either next generation reactors, or a current generation Tiberium reactor."
    
    
    tech_tiberium_ionization_1:0 "Particle Beam Generation"
    tech_tiberium_ionization_1_desc:0 "By using Tiberium for energy generation, this weapon generates a stream of charged particles that are accelerated to the target at near-relativistic speeds. While shielding more easily disperses these particles, much like with photons, it is devastating against armor and hull."
    tech_tiberium_ionization_2:0 "Improved Capacitors"
    tech_tiberium_ionization_2_desc:0 "The old energy capacitors are unable to keep up with the power draw of a next generation Ion Cannon. With appropriate research, new capacitors can be attached to the Ion Cannon, improving its energy output."
    tech_tiberium_ionization_3:0 "Beam Attenuation"
    tech_tiberium_ionization_3_desc:0 "Using new focusing techniques designed specifically for particle beams, we are able to create a more dense flow of particles."
    tech_tiberium_ionization_4:0 "Rare Crystal Lensing"
    tech_tiberium_ionization_4_desc:0 "Rare Crystals are used to make the lenses used to focus the Ion Cannon beam, allowing for increased focus on our beams, causing a larger amount of damage on impact."
    tech_tiberium_ionization_5:0 "Tiberium Ionization"
    tech_tiberium_ionization_5_desc:0 "Tiberium ions are used as the particles in these Ion Cannons, allowed due to the properties of Rare Crystals in resisting Tiberium degredation and using Tiberium resistant alloys in place of conventional alloys."
    
    tech_tiberium_missile_core_1:0 "Liquid Tiberium Cores"
    tech_tiberium_missile_core_1_desc:0 "Liquid tiberium is very volatile, and as such is ideal for missile payloads. With careful experimentation, we can design a warhead capable of housing a liquid tiberium payload."
    tech_tiberium_missile_core_2:0 "Compressed Liquid Tiberium Cores"
    tech_tiberium_missile_core_2_desc:0 "Advances in Liquid Tiberium storage techniques allows us to design a warhead that has a more dense concentration of Liquid Tiberium."
    tech_tiberium_missile_core_3:0 "Shaped Charge Tiberium Warheads"
    tech_tiberium_missile_core_3_desc:0 "Containment fields are used to direct the detonation of the Liquid Tiberium, directing all the explosive force of a condensed LT warhead in the direction of the enemy."
    tech_tiberium_missile_core_4:0 "Antimatter/Liquid Tiberium Warhead"
    tech_tiberium_missile_core_4_desc:0 "A Matter/Antimatter detonation is used to kickstart the LT detonation, in much the same way as Thermonuclear weapons, resulting in a higher yield."
    tech_tiberium_missile_core_5:0 "Tiberium/Anti-Tiberium Warhead"
    tech_tiberium_missile_core_5_desc:0 "The discovery of Anti-Tiberium has allowed us to make a purely Tiberium matter/antimatter warhead. The resulting explosion is much more powerful than the detonation of our standard matter/antimatter reactions."
    
    tech_tiberium_sonics:0 "Sonic Tiberium Removal"
    tech_tiberium_sonics_desc:0 "Since tiberium is a crystal, we can shatter it using sound. All we have to do is find its resonant frequency. This will allow us to contain or even reverse the Tiberium infestation of a planet."
    
    sr_tiberium_green:0 "Green Tiberium"
    sr_tiberium_green_desc:0 "Tiberium Riparius is the most basic form of Tiberium. Its crystals are small and green in appearance, thus it is commonly referred to as green Tiberium. This type of Tiberium has a relatively low level of leeched minerals and is, therefore, the least valuable resource, albeit the most available. Tiberium Riparius grows and spreads very fast."
    sr_tiberium_blue:0 "Blue Tiberium"
    sr_tiberium_blue_desc:0 "After some time, developed Riparius crystals mature into Tiberium Vinifera, which is blue in appearance, and has crystals about the same size as Riparius. Vinifera is commonly referred to as "blue Tiberium" because of its color. This Tiberium spreads more slowly than Riparius, has much greater mineral density, and is highly combustable."
    sr_tiberium_liquid:0 "Liquid Tiberium"
    sr_tiberium_liquid_desc:0 "Tiberium that has liquified due to heating and/or pressure, Liquid Tiberium retains its resource rich heritage and gains volatility and compressability due to being liquid. More liquid tiberium can be stored in a given area than in crystal form, and can be used in much the same way as a chemical fuel source."
    
    mod_country_resource_max_sr_tiberium_green_add:0 "Green Tiberium Storage"
    mod_country_resource_max_sr_tiberium_blue_add:0 "Blue Tiberium Storage"
    mod_country_resource_max_sr_tiberium_liquid_add:0 "Liquid Tiberium Storage" 
    
    trait_pc_habitable_tiberium_preference:0 "Habitable Tiberium Preference"
    trait_pc_uninhabitable_tiberium_preference:0 "Tiberium World Preference"
    
   #Planet Stuff
    
    pc_habitable_tiberium:0 "Habitable Tiberium World"
    pc_habitable_tiberium_desc:0 "A habitable planet infected with tiberium. It may still be possible to live here, depending on how far along the infestation has progressed."
    pc_uninhabitable_tiberium:0 "Uninhabitable Tiberium World"
    pc_uninhabitable_tiberium_desc:0 "An uninhabitable planet that has been infected with tiberium. The value of this crystal is enough to convince several groups to live here."
    pc_tiberium_depleted:0 "Depleted Tiberium World"
    pc_tiberium_depleted_desc:0 "A desolate world, drained of its mineral wealth by tiberium. Terraforming is possible, but will be expensive."
    
    col_tiberium_mining:0 "Tiberium Mine"
    col_tiberium_mining_desc:0 "This planet is dedicated to extracting the mineral wealth of this planet, as collected by Tiberium."
    col_tiberium_refinery:0 "Tiberium Refinery"
    col_tiberium_refinery_desc:0 "This planet is dedicated to refining volatile Tiberium crystals into more stable, useful forms."
 
 #Decisions
 
    infect_planet_green:0 "Green Tiberium Seed"
    infect_planet_green_desc:0 "Infect this planet with green tiberium, to start the process."
    infect_planet_blue:0 "Blue Tiberium Seed"
    infect_planet_blue_desc:0 "Infect this planet with blue tiberium, to start the process at a later stage."
    infect_planet_liquid:0 "Liquid Tiberium Seed"
    infect_planet_liquid_desc:0 "Infect this planet with liquid tiberium, to start the process with lots of tiberium."
    infect_habitable_planet_green:0 "Green Tiberium Seed"
    infect_habitable_planet_green_desc:0 "Infect this planet with green tiberium, to start the process."
    infect_habitable_planet_blue:0 "Blue Tiberium Seed"
    infect_habitable_planet_blue_desc:0 "Infect this planet with blue tiberium, to start the process at a later stage."
    infect_habitable_planet_liquid:0 "Liquid Tiberium Seed"
    infect_habitable_planet_liquid_desc:0 "Infect this planet with liquid tiberium, to start the process with lots of tiberium."
    seed_tiberium:0 "Seed Tiberium"
    seed_tiberium_desc:0 "Spread liquid tiberium over the surface to accelerate tiberium growth. It will need a bit of time to fully see the results."
    
    seed_green_tib:0 "Turns the planet into an Uninhabitable Tiberium World, and adds 2 Green Tiberium Field deposits. Added deposits do not count towards depletion."
    seed_blue_tib:0 "Turns the planet into an Uninhabitable Tiberium World, and adds 2 Green Tiberium Field deposits and 1 Blue Tiberium Field deposit. Added deposits do not count towards depletion."
    seed_liquid_tib:0 "Turns the planet into an Uninhabitable Tiberium World, and adds 5 Green Tiberium Field deposits and 1 Green Tiberium Glacier. Added deposits do not count towards depletion."
    seed_green_tib_colony:0 "Turns the planet into a Habitable Tiberium World, and adds 1 Red Zone, 2 Yellow Zones, and fills the rest with Blue Zones. Added deposits do not count towards depletion."
    seed_blue_tib_colony:0 "Turns the planet into a Habitable Tiberium World, and adds 1 Red Zone, 4 Yellow Zones, and fills the rest with Blue Zones. Added deposits do not count towards depletion."
    seed_liquid_tib_colony:0 "Turns the planet into a Habitable Tiberium World, and adds 2 Red Zone, 5 Yellow Zones, and fills the rest with Blue Zones. Added deposits do not count towards depletion."
    extra_seed_liquid_tib:0 "Accelerates the growth of tiberium on this world, by adding 15 additional growth points."
    
    tiberium_clean_pops:0 "Remove Tiberium Infection"
    tiberium_clean_pops_desc:0 "There are some pops on this planet that are infected with tib. We can help them. And slow down those that are infested, even if we can't stop it."
    
    red_to_yellow_zone:0 "Red Zone Cleanup"
    red_to_yellow_zone_desc:0 "Clean up a red zone enough that we can officially class it as a yellow zone."
    yellow_to_blue_zone:0 "Yellow Zone Cleanup"
    yellow_to_blue_zone_desc:0 "Clean up a yellow zone to allow settling as a blue zone."
    red_to_blue_zone:0 "Red Zone Full Cleanup"
    red_to_blue_zone_desc:0 "Fully clean a red zone into a blue zone."
    
    red_to_yellow_zone_sonic: "Sonic Red Zone Abatement"
    red_to_yellow_zone_sonic_desc: "Using sonic weaponry, we can reduce the amount of tiberium in this area."
    yellow_to_blue_zone_sonic:0 "Sonic Yellow Zone Cleanup"
    yellow_to_blue_zone_sonic_desc:0 "Using sonic weaponry, we can clear all the tiberium out of this area."
    red_to_blue_zone_sonic:0 "Sonic Red Zone Cleanup"
    red_to_blue_zone_sonic_desc:0 "Using sonic weaponry, we can clear all the tiberium out of this area."
	
    tiberium_sonic_protection:0 "Sonic Protection"
    tiberium_sonic_protection_desc:0 "Utilize sonics to protect against tiberium on this world. Reduces potential tiberium growth by the same amount as 10 harvester jobs, but never causes tiberium to recede, and reduces the max allowed deposit changes by 1. On non-tib worlds, also makes it 2.5x harder for Red Zones to appear."
    tiberium_sonic_protection_remove:0 "Remove Sonic Protection"
    tiberium_sonic_protection_remove_desc:0 "Dismantle the sonic equipment here."
    
 #Policies
    
    policy_tiberium_harvest:0 "Tiberium Harvest"
    policy_tiberium_harvest_desc:0 "Control the relative speed at which tiberium is harvested. Affects the number of jobs from tiberium harvesting operations. Tiberium growth is based on a weighted sum of all tiberium present on the planet (More extreme tiberium deposits count for more), minus the number of harvesting jobs. The 'Sustainable Harvest' policy will maintain current tiberium levels if you have built all the harvesting districts you need, and have fully staffed them."
    Underharvest:0 "Underharvest"
    Underharvest_desc:0 "Harvest less tiberium than grows, allowing it to continue spreading."
    sustainable_harvest:0 "Sustainable Harvest"
    sustainable_harvest_desc:0 "Keep pace with tiberium grow to maintain current levels."
    Overharvest:0 "Overharvest"
    Overharvest_desc:0 "Aggressivley harvest Tiberium, to get maximum short-term income."
    underharvest_tiberium_name:0 "Underharvest"
    sustainable_harvest_tiberium_name:0 "Sustainable Harvest"
    overharvest_tiberium_name:0 "Overharvest"
    Overharvest_name:0 "Overharvest"
    
    policy_tiberium_use:0 "Tiberium Usage"
    policy_tiberium_use_desc:0 "Control how tiberium is used in the empire. Affects pop infection."
    Augmentation:0 "Augmentation"
    Augmentation_desc:0 "Attempt to use tiberium to augment our species'. Increases the likelyhood of tiberium mutation in pops exposed."
    tiberium_augmentation_name:0 "Augmentation"
    Resource:0 "Resource"
    Resource_desc:0 "Use tiberium strictly as a resource."
    tiberium_resource_name:0 "Resource"
    Banned:0 "Banned"
    Banned_desc:0 "Ban use of tiberium, and actively seek to cleanse our planets. Any pops newly infected by tiberium are killed."
    Banned_name:0 "Banned"
    tiberium_banned_name:0 "Banned"
    
    policy_tiberium_safety:0 "Tiberium Safety"
    policy_tiberium_safety_desc:0 "Define the safety protocols for harvesting tiberium. Affects pop infection, and production/upkeep for tiberium jobs."
    tiberium_safe_name:0 "Maximum Safety"
    Safe_desc:0 "Every safety protocal is taken in the harvest of tiberium. This will greatly reduce yield."
    tiberium_priority_safe_name:0 "High Safety"
    High_Safety:0 "High Safety"
    High_Safety_desc:0 "Most safety protocols are used. This will reduce yield."
    tiberium_balanced_safe_name:0 "Balance safety with production"
    Balance_safety_and_production:0 "Balance safety and production"
    Balance_safety_and_production_desc:0 "Use some safety protocols, and some production protocols. Yield is average."
    tiberium_minimal_safe_name:0 "Minimal Safety"
    Minimal_Safety:0 "Minimal Safety"
    Minimal_Safety_desc:0 "Disregard all except the biggest safety protocols. Yield increased."
    tiberium_no_safe_name:0 "No Safety"
    No_Safety:0 "No Safety"
    No_Safety_desc:0 "Workers are replaceable. Yield greatly increased."
    
    edict_tiberium_cleanup:0 "Tiberium Cleanup"
    edict_tiberium_cleanup_desc:0 "Put into place policies and incentives to clean up tiberium. Acts as though there are 10 additional harvester jobs for each planet."
    
 #Buildings
    
    tiberium_green_refinery:0 "Green Tiberium Refinery"
    tiberium_green_refinery_desc:0 "A building for refining Green Tiberium into usable minerals and alloys."
    tiberium_blue_refinery:0 "Blue Tiberium Refinery"
    tiberium_blue_refinery_desc:0 "A building for refining Blue Tiberium into usable minerals and alloys."
    
    liquid_tiberium_factory_green:0 "Green Liquid Tiberium Refinery"
    liquid_tiberium_factory_green_desc:0 "A building for safely melting green tiberium into liquid tiberium."
    liquid_tiberium_factory_blue:0 "Blue Liquid Tiberium Refinery"
    liquid_tiberium_factory_blue_desc:0 "A building for safely melting blue tiberium into liquid tiberium."
    
    liquid_tiberium_reactor:0 "Tiberium Power Plant"
    liquid_tiberium_reactor_desc:0 "A power plant running entirely on Liquid Tiberium."
    liquid_tiberium_reactor_2:0 "Liquid Tiberium Reactor"
    liquid_tiberium_reactor_2_desc:0 "A reactor that uses liquid tiberium as fuel."
    
    building_initial_tiberium_research_lab:0 "Glowing Asteroid Research Lab"
    building_initial_tiberium_research_lab_desc:0 "A lab to research the glowing asteroid that landed on this planet. It has some containment procedures that may help."
    mod_building_initial_tiberium_research_lab_max:0 "Glowing Asteroid Research Lab"
    building_tiberium_threshold:0 "Threshold Tower"
    building_tiberium_threshold_desc:0 "This tower draws in Tiberium veins located underneath it and stores the materials inside."
    building_tiberium_harvester:0 "Tiberium Spike"
    building_tiberium_harvester_desc:0 "Harvests tiberium on this planet. The hosts won't mind."
    building_tiberium_farm:0 "Tiberium Spike"
    building_tiberium_farm_desc:0 "Seeds a small area with tiberium to farm. The hosts won't mind."
    building_tiberium_refinery:0 "Tiberium Refinery"
    building_tiberium_refinery_desc:0 "Place some tiberium refining operations on this planet. The hosts won't mind."
    
    tiberium_green_refinery_2:0 "Upgraded Green Refinery"
    tiberium_green_refinery_2_desc:0 "A more specialized building to house and refine Green Tiberium, taking up the same amount of space as a previous generation refinery."
    tiberium_green_refinery_3:0 "Tier 3 Green Refinery"
    tiberium_green_refinery_3_desc:0 "This refinery liquidizes the green tiberium by safely heating and melting the crystals, then extracts the valuable minerals from the liquid. This allows for extraction of the valuable minerals and alloys at an uprecedented rate."
    tiberium_blue_refinery_2:0 "Upgraded Blue Refinery"
    tiberium_blue_refinery_2_desc:0 "A more specialized building to house and refine Blue Tiberium, taking up the same amount of space as a previous generation refinery."
    tiberium_blue_refinery_3:0 "Tier 3 Blue Refinery"
    tiberium_blue_refinery_3_desc:0 "This reinforced refinery liquidizes the blue tiberium by safely heating and melting the crystals, then extracts the valuable minerals from the liquid. This allows for extraction of the valuable minerals and alloys at an unprecedented rate."
    liquid_tiberium_factory_green_2:0 "Upgraded Liquid Green Factory"
    liquid_tiberium_factory_green_2_desc:0 "A more specialized building to house and create Liquid Tiberium, taking up the same amount of space as a previous generation refinery."
    liquid_tiberium_factory_green_3:0 "Tier 3 Liquid Green Factory"
    liquid_tiberium_factory_green_3_desc:0 "This building takes vast amounts of Green Tiberium and converts it into Liquid Tiberium."
    liquid_tiberium_factory_blue_2:0 "Upgraded Liquid Blue Factory"
    liquid_tiberium_factory_blue_2_desc:0 "A more specialized building to house and create Liquid Blue Tiberium, taking up the same amount of space as a previous generation refinery."
