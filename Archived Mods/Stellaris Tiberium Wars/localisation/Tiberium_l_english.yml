 #Concepts
    concept_tiberium_cap: "Total Tiberium Available"
    concept_tiberium_cap_desc: "This number is Planet Size * 6. When the Tiberium Grown number reaches this value, the planet becomes depleted and no more tiberium will grow."
    concept_tiberium_grown: "Tiberium Grown"
    concept_tiberium_grown_desc: "This number tracks how many cycles tiberium deposits have grown on this planet with a Growth Potential 10 or higher before growth."
    concept_tiberium_growth: "Tiberium Growth Potential (Last Cycle)"
    concept_tiberium_growth_desc: "This number is a weighted sum of all tiberium on the planet, minus all harvesting jobs on the planet. Each tiberium deposit counts for as many jobs as it provides at Sustainable Harvest. For instance, a Green Field that allows 1 Green Harvester districts, which provides 2 harvester jobs with Sustainable Harvest, and so provides 2 to this number, every infest cycle. Each harvesting job subtracts 1 from this number, every cycle. Each tiberium researcher job subtractsd 1 from this number, as long as the planet is not depelted."
    concept_tiberium_growth_current: "Tiberium Growth Potential (Current)"
    concept_tiberium_growth_current_desc: "$concept_tiberium_growth_desc$"
    concept_tiberium_deposit_growth: "Tiberium Deposit Growth"
    concept_tiberium_deposit_growth_desc: "Each planet has a limit of how many deposits can be placed or upgraded per infest cycle. Base is 3."
 
 
