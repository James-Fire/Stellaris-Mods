	#Events
 	 iced_gateway_category:0 "Massive Energy Signature"
	 iced_gateway_category_desc:0 "The energy readings we are getting from this bhunk of ice are too high to be something small, or just a blip. Investigation is required."
	 transhum_4_desc:0 "We have finally finished the first section of the Shell around Sol, massively increasing our available living space. With the planets in the system being overfull, this new location will soon see a mass influx of population to fill it. We had better get it ready."
	 transhum_30_desc:0 "There appears to several structures buried in this object. We have found the three that are closest to the surface, and have started excavation to uncover some of it."
     transhum_40_desc:0 "This scientist out here planned, designed, and built incredibly efficient nanotechnology. While it is only in the infant stages of development, what he has is far beyond our own technology. \nRegretably, or perhaps not, since he wasn't too friendly last time we saw him, he appears to not be here."
     transhum_31_desc:0 ""
     transhum_32_desc:0 ""
     transhum_33_desc:0 ""
     transhum_34_desc:0 "The structures here are actually one big one, that appears to be a form of teleportation device, large enough to transport ships. If we could get it out, we may be able to use it. Or even reverse-engineer it."
     transhum_41_desc:0 "The wormhole device has opened, and we are making preparations to leave our home system for the first time."
     transhum_45_desc:0 "We have succeeded in forcing them to give up their BioReactor technology."
     
     transhum.51.name:0 "Uploading For All"
     transhum.51.desc:0 "With recent breakthroughs in computer server space, we can upload everyone. Some may resist the change, and we will not force them."
     transhum.51.a:0 "Let's prepare it for everyone that does."
     transhum.52.name:0 "Everyone Has Been Uploaded"
     transhum.52.desc:0 "Any that requested to be uploaded have been so. We are now a largely virtual race."
     transhum.52.a:0 "Excellent."
     transhum.60.name:0 "Foreign FTL"
     transhum.60.desc:0 "The empire we just found appears has true FTL technology, unlike our STL Singularity drives. We should try communicating with them."
     transhum.61.name:0 "Foreign FTL"
     transhum.61.desc:0 "Now that we have communications, we can try various actions to get the FTl technology from them."
     transhum.66.name:0 "Espionage Options"
     transhum.66.desc:0 "There are several methods of espionage to get what we want. The key is picking the one least likely to get us caught."
     transhum.67.name:0 "Espionage Success!"
     transhum.67.desc:0 "We have successfully stolen data that will allow us to reverse engineer their FTL."
     transhum.68.name:0 "Diplomatic Options"
     transhum.68.desc:0 "We have several options for a diplomatic resolution. The key is picking which one is the best."
     transhum.69.name:0 "Diplomacy Wins"
     transhum.69.desc:0 "Our efforts through diplomatic channels have been realized, and they have shared the technology with us."
     transhum.100.name:0 "Note to Players"
     transhum.100.desc:0 "Progress time at normal speed for the first month, and don't do anything with your planets in this time. This is to avoid crashing from overloading the scripting system. If it does crash, try again. If it still crashes, let me know.\nVenus needs its designation set to Agri-World in order for you to have enough food. \nThe Deep Space Habitat near Pluto can mine minerals once built. \nYou are capable of building more habitats. \nYou have a decision to place the Terraforming Candidate modifier on Barren and Frozen planets. There are special terraform options that allow usage of this before Climate Restoration. \nYou have the first half of an Upload Decision, that can be enacted on planets to connect it to the empire-wide Uploaded network, increasing efficiency. This decision grants reduced pop upkeep, and more districts in the case of habitats."
     
    
     GATEWAY_DISCOVERY_PROJECT:0 "Massive Energy Signature"
     GATEWAY_DISCOVERY_PROJECT_DESC:0 "The energy readings we are getting from this chunk of ice are too high to be something small, or just a blip. Investigation is required."
     site_hidden_gateway:0 "Frozen Structure"
     site_hidden_gateway_intro:0 "There are several structures encased in ice here. Excavating them to get a closer look may be worth our while."
     GATEWAY_UNCOVER_PROJECT:0 "Wormhole Excavation"
     GATEWAY_UNCOVER_PROJECT_DESC:0 "The buried structure is capable of generating wormholes. Perhaps we can use it to escape?"
     transhum_41_desc:0 "The last of the debris has been cleared off of this structure, revealing a massive single structure, which comes online."
     NANITE_PROJECT:0 "Mad Scientist's Lab"
     NANITE_PROJECT_DESC:0 "A crazed scientist went out to this asteroid some decades ago. Recently, we've detected lots of activity. Dispatch a ship to check it out."
    #Uploading
	 
        trait_uploaded:0 "Uploaded"
        trait_uploaded_desc:0 "A good chunk of this species is Uploaded, and thus digital."
        leader_trait_governor_uploaded:0 "Simulation Emulation"
        leader_trait_governor_uploaded_desc:0 "This governor has taking special training in network management and algorithm streamlining, and is helping to make digital space more comfortable. Results has shown improvements in R&R quality, with improvements in productivity across the board following."
        leader_trait_scientist_uploaded:0 "Unfettered Archival Access"
        leader_trait_scientist_uploaded_desc:0 "This scientist has complete access to otherwise restricted data both internal and external to [owner.GetName], and this wealth of knowledge alongside insight enables streamlined research and planetary analysis."
        leader_trait_admiral_uploaded:0 "Hardened QIHs"
        leader_trait_admiral_uploaded_desc:0 "All crew among the fleet have been provided extra-reinforced QIHs, allowing Uploaded crew to survive even in the case of catastrophic ship loss. This results in combat vessels not seeing a necessity to retreat under most circumstances, as ships are easily replaceable."
        leader_trait_general_uploaded:0 "M7 Avaunt Arsenal Suite"
        leader_trait_general_uploaded_desc:0 "This general has access to the latest version of the experimental power-armored war-bodies, providing an extreme increase in troop durability and proficiency."
        leader_trait_ruler_uploaded:0 "Guided by Council"
        leader_trait_ruler_uploaded_desc:0 "The ruler either has established communications with, or is a part of, a Council whose agenda is to guide [Root.Owner.GetAdj] towards a better, prosperous future."
        
        UPLOADING_PROJECT:0 "Prepare for Upload"
        UPLOADING_PROJECT_DESC:0 "Cyberspace is vast, and much denser in realspace than organic bodies require. Uploaidng a significant portion of our population will reduce space requirements drastically. Networking it all together will make travel a breeze, especially for our important figures."
        upload_habitat_1:0 "Partial Network Integration"
        upload_habitat_1_desc:0 "Build the necessary servers and infrastructure to provide partial access to the Uploaded Network."
        upload_habitat_2:0 "Complete Network Integration"
        upload_habitat_2_desc:0 "Build the necessary servers and infrastructure to provide complete access to the Uploaded Network."
        habitat_uploaded_1:0 "Partial Network Integration"
        habitat_uploaded_1_desc:0 "This habitat is partially connected to the empire Transcendent network, allowing a population of Uploaded."
        habitat_uploaded_2:0 "Complete Network Integration"
        habitat_uploaded_2_desc:0 "This habitat is fully connected to the empire Transcendent network, allowing a significant population of Uploaded."
	
        upload_planet_1:0 "Partial Network Integration"
        upload_planet_1_desc:0 "Build the necessary servers and infrastructure to provide partial access to the Uploaded Network."
        upload_planet_2:0 "Complete Network Integration"
        upload_planet_2_desc:0 "Build the necessary servers and infrastructure to provide complete access to the Uploaded Network."
        planet_uploaded_1:0 "Partial Network Integration"
        planet_uploaded_1_desc:0 "This planet is partially connected to the empire Transcendent network, allowing a population of Uploaded."
        planet_uploaded_2:0 "Complete Network Integration"
        planet_uploaded_2_desc:0 "This planet is fully connected to the empire Transcendent network, allowing a significant population of Uploaded."
	
    
